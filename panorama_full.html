            for (let i = 1; i <= 5; i++) allScenes.push(`一栋-${f}f-${i}`);
        }
        for (let f = 1; f <= 2; f++) {
            for (let i = 1; i <= 5; i++) allScenes.push(`二栋-${f}f-${i}`);
        }
        for (let f = 3; f <= 5; f++) {
            for (let i = 1; i <= 4; i++) allScenes.push(`二栋-${f}f-${i}`);
        }
        for (let f = 1; f <= 5; f++) allScenes.push(`连廊-${f}f`);
        for (let f = 1; f <= 3; f++) allScenes.push(`三栋-${f}f`);

        // 填充目的地菜单
        const destSelect = document.getElementById("destinationSelect");
        allScenes.forEach(scene => {
            const opt = document.createElement("option");
            opt.value = scene; opt.textContent = scene;
            destSelect.appendChild(opt);
        });

        // ======================= 2. 构建连接图（用于导航）=======================
        const connections = new Map();
        allScenes.forEach(s => connections.set(s, []));
        function addLink(a, b) {
            if (!connections.get(a).includes(b)) connections.get(a).push(b);
            if (!connections.get(b).includes(a)) connections.get(b).push(a);
        }

        // 二栋楼层内连接
        function addErdongFloor(floor, maxNum) {
            const ids = [];
            for (let i = 1; i <= maxNum; i++) ids.push(`二栋-${floor}f-${i}`);
            if (maxNum >= 2) addLink(ids[0], ids[1]);
            if (maxNum >= 3) addLink(ids[0], ids[2]);
            if (maxNum >= 4) {
                addLink(ids[1], ids[3]);
                addLink(ids[2], ids[3]);
            }
            if (maxNum === 5) {
                addLink(ids[3], ids[4]);
                addLink(ids[4], ids[1]);
                addLink(ids[4], ids[3]);
            } else if (maxNum === 4) {
                addLink(ids[3], ids[1]);
                addLink(ids[3], ids[2]);
            }
        }
        for (let f = 1; f <= 2; f++) addErdongFloor(f, 5);
        for (let f = 3; f <= 5; f++) addErdongFloor(f, 4);
        for (let f = 1; f <= 4; f++) {
            const cur1 = `二栋-${f}f-1`, up1 = `二栋-${f+1}f-1`;
            if (allScenes.includes(up1)) addLink(cur1, up1);
            const cur4 = `二栋-${f}f-4`, up4 = `二栋-${f+1}f-4`;
            if (allScenes.includes(up4)) addLink(cur4, up4);
        }

        // 一栋连接

            addLink(ids[0], ids[1]);
            addLink(ids[1], ids[2]);
            addLink(ids[1], ids[4]);
            addLink(ids[2], ids[3]);
            addLink(ids[3], ids[2]);
            addLink(ids[3], ids[4]);
            addLink(ids[4], ids[1]);
            addLink(ids[4], ids[3]);
        }
        addLink("一栋-1f-2", "一栋-2f-1");
        for (let f = 2; f <= 4; f++) addLink(`一栋-${f}f-1`, `一栋-${f+1}f-1`);

}

        scenesConfig["一栋-5f-4"] = { title: "一栋-5f-4", panorama: "一栋-5f-4.jpg", hotSpots: [
            { pitch: 0.8537836310852818, yaw: -180.00619390273275, type: "scene", text: "→ 前往 连廊-5f", sceneId: "连廊-5f" },
            { pitch: 0.14105300386973374, yaw: 14.940694769888589, type: "scene", text: "→ 前往 一栋-5f-3", sceneId: "一栋-5f-3" },
            { pitch: -0.6482982210308116, yaw: -89.92994354550785, type: "scene", text: "→ 前往 一栋-5f-5", sceneId: "一栋-5f-5" }
        ] };
        scenesConfig["一栋-5f-5"] = { title: "一栋-5f-5", panorama: "一栋-5f-5.jpg", hotSpots: [
            { pitch: -2.5842985724686187, yaw: 1.7360822073680895, type: "scene", text: "→ 前往 一栋-5f-4", sceneId: "一栋-5f-4" },
            { pitch: -0.5103850925038725, yaw: -89.77122634123958, type: "scene", text: "→ 前往 一栋-5f-2", sceneId: "一栋-5f-2" }
        ] };

        // 三栋
        scenesConfig["三栋-3f"] = { title: "三栋-3f", panorama: "三栋-3f.jpg", hotSpots: [
            { pitch: -0.9475420665271345, yaw: 358.46650615849865, type: "scene", text: "→ 前往 一栋-3f-1", sceneId: "一栋-3f-1" },
            { pitch: -18.66018538478752, yaw: 178.32340072027864, type: "scene", text: "↓ 前往 三栋-2f", sceneId: "三栋-2f" }
        ] };
       scenesConfig["三栋-2f"] = { title: "三栋-2f", panorama: "三栋-2f.jpg", hotSpots: [
            { pitch: 2.1927516866805865, yaw: 101.61045062479965, type: "scene", text: "↑ 前往 三栋-3f", sceneId: "三栋-3f" },
            { pitch: -11.461389993895548, yaw: 91.72401241112959,  type: "scene", text: "↓ 前往 三栋-1f", sceneId: "三栋-1f" },
            { pitch: 1.5618222016581844, yaw: -91.15946151848522, type: "scene", text: "→ 前往 一栋-2f-1", sceneId: "一栋-2f-1" }
        ] };
        scenesConfig["三栋-1f"] = { title: "三栋-1f", panorama: "三栋-1f.jpg", hotSpots: [
            { pitch: 5.2002276854558165, yaw: 171.1731691144815, type: "scene", text: "↑ 前往 三栋-2f", sceneId: "三栋-2f" }
        ] };

        // 未提供精确角度的场景生成默认热点（角度0，带方向箭头）
        function getFloorLevel(sceneId) {
            const match = sceneId.match(/(\d+)f/);
            return match ? parseInt(match[1]) : null;
        }
        for (const sceneId of allScenes) {
            if (scenesConfig[sceneId]) continue;
            const neighbors = connections.get(sceneId) || [];
            const hotSpots = [];
            for (const nb of neighbors) {
                const fromFloor = getFloorLevel(sceneId);
                const toFloor = getFloorLevel(nb);
                let arrow = "→";
                if (fromFloor !== null && toFloor !== null) {
                    if (toFloor > fromFloor) arrow = "↑";
                    else if (toFloor < fromFloor) arrow = "↓";
                }
                hotSpots.push({ pitch: 0, yaw: 0, type: "scene", text: `${arrow} 前往 ${nb}`, sceneId: nb });
            }
            scenesConfig[sceneId] = { title: sceneId, panorama: `${sceneId}.jpg`, hotSpots: hotSpots };
        }


        const PANORAMA_BASE = 'panoramas/';
        const PANORAMA_CACHE_VER = '20260610-compress';
        for (const id of Object.keys(scenesConfig)) {
            let p = scenesConfig[id].panorama;
            if (p && !p.startsWith(PANORAMA_BASE)) p = PANORAMA_BASE + p;
            if (p && !p.includes('?v=')) p += '?v=' + PANORAMA_CACHE_VER;
            scenesConfig[id].panorama = p;
        }

        // ======================= 4. 最近 5 场景缓存（LRU；addScene 切换，不 destroy 整 viewer） =======================
        const SCENE_CACHE_MAX = 5;
        const qs = new URLSearchParams(location.search);
        let firstScene = qs.get("scene") || "连廊-1f";
        if (!scenesConfig[firstScene]) {
            console.warn("未知场景参数，回退连廊-1f:", firstScene);
            firstScene = "连廊-1f";
        }

        let currentSceneId = null;
        let sceneLoading = false;
        let pendingSceneId = null;
        let guideModeActive = false;
        const sceneCacheOrder = [];
        const roomHotspotsAdded = new Set();
        const prefetchedPanos = new Set();
        const roomDataByScene = window.ROOM_DATA_BY_SCENE || {};
        const roomTooltip = document.getElementById("roomTooltip");
        const roomInfoPanel = document.getElementById("roomInfoPanel");
        const roomToScene = new Map();

        function buildSceneHotspots(sceneId) {
            return (scenesConfig[sceneId]?.hotSpots || []).map(h => ({
                pitch: h.pitch,
                yaw: h.yaw,
                type: "scene",
                text: h.text,
                /* 不设 sceneId：避免 Pannellum 内置切场景绕过 LRU；clickHandlerFunc 走 switchToScene */
                clickHandlerFunc: function() { switchToScene(h.sceneId); }
            }));
        }

        function prefetchPanorama(sceneId) {
            if (!sceneId || prefetchedPanos.has(sceneId)) return;
            const url = scenesConfig[sceneId]?.panorama;
            if (!url) return;
            prefetchedPanos.add(sceneId);
            const img = new Image();
            img.decoding = "async";
            img.src = url;
        }

        function prefetchNeighbors(sceneId) {
            for (const nb of (connections.get(sceneId) || []).slice(0, 3)) prefetchPanorama(nb);
        }

        function touchSceneCache(sceneId) {
            const evicted = [];
            const i = sceneCacheOrder.indexOf(sceneId);
            if (i >= 0) sceneCacheOrder.splice(i, 1);
            sceneCacheOrder.push(sceneId);
            while (sceneCacheOrder.length > SCENE_CACHE_MAX) {
                const id = sceneCacheOrder.shift();
                evicted.push(id);
                roomHotspotsAdded.delete(id);
            }
            return evicted;
        }

        function buildSceneObject(sceneId) {
            const cfg = scenesConfig[sceneId];
            return {
                title: cfg.title,
                panorama: cfg.panorama,
                hotSpots: buildSceneHotspots(sceneId)
            };
        }

        function viewerHasScene(sceneId) {
            const scenes = window.viewer && window.viewer.getConfig().scenes;
            return !!(scenes && scenes[sceneId]);
        }

        function bindViewerEvents(initialSceneId) {
            window.viewer.on("load", function() {
                const id = window.viewer.getScene ? window.viewer.getScene() : initialSceneId;
                onSceneReady(id);
            });
            window.viewer.on("scenechange", function(id) { onSceneReady(id); });
            window.viewer.on("error", function(err) {
                sceneLoading = false;
                console.error("全景加载失败", err);
                document.getElementById("currentSceneLabel").innerHTML = `❌ 加载失败：${currentSceneId || initialSceneId}`;
            });
        }

        function updateMapNavLink(sceneId) {
            const link = document.getElementById("mapNavLink");
            if (!link || typeof PanoramaMapBridge === "undefined") return;
            const mapped = PanoramaMapBridge.panoramaSceneToMapNode(sceneId);
            if (mapped) {
                link.href = PanoramaMapBridge.mapUrlForStart(mapped.navNodeId);
                link.textContent = `🗺️ 二维地图（${mapped.label} · ${mapped.zoneLabel}）`;
                link.title = `在二维地图定位起点：${mapped.navNodeId}`;
            } else {
                link.href = "map.html";
                link.textContent = "🗺️ 二维地图导航";
                link.title = "当前全景场景暂无二维节点对照";
            }
        }

        function onSceneReady(sceneId) {
            if (sceneId === currentSceneId && !sceneLoading) return;
            sceneLoading = false;
            currentSceneId = sceneId;
            updateMapNavLink(sceneId);
            roomTooltip.style.display = "none";
            document.getElementById("currentSceneLabel").innerHTML = `📍 当前场景：${sceneId}`;
            addRoomHotspotsForScene(sceneId);
            resetRoomPanel(sceneId);
            prefetchNeighbors(sceneId);
            const dest = document.getElementById("destinationSelect").value;
            if (dest) {
                if (dest === sceneId) showArrived(dest, document.getElementById("roomSelect").value || "");
                else if (guideModeActive) onSceneGuideUpdate();
            }
            if (pendingSceneId && pendingSceneId !== sceneId) {
                const next = pendingSceneId;
                pendingSceneId = null;
                switchToScene(next);
            }
        }

        function createViewer(sceneId) {
            if (!scenesConfig[sceneId]) return null;
            const scenes = {};
            for (const id of sceneCacheOrder) scenes[id] = buildSceneObject(id);
            window.viewer = pannellum.viewer("panorama", {
                default: { firstScene: sceneId, sceneFadeDuration: 200, autoLoad: true },
                scenes
            });
            bindViewerEvents(sceneId);
            return window.viewer;
        }

        function switchToScene(sceneId) {
            if (!scenesConfig[sceneId]) return;
            if (sceneId === currentSceneId && window.viewer && !sceneLoading) return;
            if (sceneLoading) {
                pendingSceneId = sceneId;
                return;
            }
            sceneLoading = true;
            const evicted = touchSceneCache(sceneId);
            if (!window.viewer) {
                createViewer(sceneId);
                return;
            }
            for (const id of evicted) {
                try { window.viewer.removeScene(id); } catch (e) { console.warn(e); }
            }
            if (!viewerHasScene(sceneId)) {
                window.viewer.addScene(sceneId, buildSceneObject(sceneId));
            }
            window.viewer.loadScene(sceneId);
        }

        // ======================= 4b. 房间标注（info 热点） =======================
        function resetRoomPanel(sceneId) {
            const n = (roomDataByScene[sceneId] || []).length;
            if (n) roomInfoPanel.innerHTML = `🏢 当前 <strong>${sceneId}</strong>：${n} 个房间标注，点击蓝点查看`;
            else if (sceneId.startsWith('连廊-')) roomInfoPanel.innerHTML = '🏢 连廊场景无房间标注，请沿箭头前往各栋';
            else roomInfoPanel.innerHTML = `🏢 当前 <strong>${sceneId}</strong> 无房间标注`;
        }

        function addRoomHotspotsForScene(sceneId) {
            if (roomHotspotsAdded.has(sceneId)) return;
            const rooms = roomDataByScene[sceneId];
            if (!rooms || !rooms.length || !window.viewer) return;
            rooms.forEach(room => {
                window.viewer.addHotSpot({
                    pitch: room.pitch,
                    yaw: room.yaw,
                    type: "info",
                    cssClass: "room-info-hotspot",
                    createTooltipFunc: function(hotSpotDiv) {
                        hotSpotDiv.addEventListener("mouseenter", () => {
                            roomTooltip.innerHTML = (room.hoverText || room.name).replace(/\n/g, "<br>");
                            roomTooltip.style.display = "block";
                            const r = hotSpotDiv.getBoundingClientRect();
                            roomTooltip.style.left = (r.left + r.width / 2 - roomTooltip.offsetWidth / 2) + "px";
                            roomTooltip.style.top = (r.top - roomTooltip.offsetHeight - 6) + "px";
                        });
                        hotSpotDiv.addEventListener("mouseleave", () => { roomTooltip.style.display = "none"; });
                    },
                    clickHandlerFunc: function() {
                        roomInfoPanel.innerHTML = `<strong>🏠 ${room.name}</strong><br>${room.detailHtml}`;
                    }
                });
            });
            roomHotspotsAdded.add(sceneId);
        }

        function cleanRoomNumber(raw) {
            if (!raw) return '';
            const m = String(raw).match(/\d+/);
            return m ? m[0] : raw;
        }

        function buildRoomIndex() {
            const roomSelect = document.getElementById('roomSelect');
            roomSelect.innerHTML = '<option value="">— 选择房间号 —</option>';
            roomToScene.clear();
            const navigableRooms = [];
            for (const [sceneId, rooms] of Object.entries(roomDataByScene)) {
                for (const room of rooms) {
                    let navId = '', displayName = '';
                    if (room.rawNumber) {
                        navId = cleanRoomNumber(room.rawNumber);
                        displayName = navId;
                    } else if (/洗手间|饮水机|电梯/.test(room.name)) {
                        navId = room.name.replace(/\s*\(.*\)$/, '');
                        displayName = navId;
                    } else {
                        continue;
                    }
                    if (!roomToScene.has(navId)) {
                        roomToScene.set(navId, sceneId);
                        navigableRooms.push({ id: navId, display: displayName, sceneId });
                    }
                }
            }
            navigableRooms.sort((a, b) => {
                const aNum = parseInt(a.id, 10), bNum = parseInt(b.id, 10);
                if (!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;
                if (!isNaN(aNum)) return -1;
                if (!isNaN(bNum)) return 1;
                return a.id.localeCompare(b.id, 'zh-CN');
            });
            for (const r of navigableRooms) {
                const opt = document.createElement('option');
                opt.value = r.id;
                opt.textContent = r.display;
                roomSelect.appendChild(opt);
            }
        }

        function showArrived(sceneId, roomLabel) {
            const roomHint = roomLabel ? `（房间 ${roomLabel}，请点击蓝点查看详情）` : '';
            document.getElementById('routeResult').style.display = 'block';
            document.getElementById('routeResult').innerHTML =
                `<div style="color:#2ecc71;">✅ 已到达 ${sceneId}${roomHint}</div>`;
        }

        function getSelectedTarget() {
            const room = document.getElementById('roomSelect').value;
            if (room) {
                const targetScene = roomToScene.get(room);
                if (!targetScene) return { error: '无法定位该房间所在的场景！' };
                return { sceneId: targetScene, roomLabel: room };
            }
            const dest = document.getElementById('destinationSelect').value;
            if (!dest) return { error: '请选择目的地场景或房间号！' };
            return { sceneId: dest, roomLabel: '' };
        }

        function jumpToScene(destinationId, roomLabel) {
            if (!destinationId) {
                document.getElementById('routeResult').style.display = 'none';
                return;
            }
            if (!scenesConfig[destinationId]) {
                alert('场景不存在：' + destinationId);
                return;
            }
            document.getElementById('destinationSelect').value = destinationId;
            if (currentSceneId === destinationId) {
                showArrived(destinationId, roomLabel);
                return;
            }
            switchToScene(destinationId);
        }

        function jumpToRoom(roomId) {
            const targetScene = roomToScene.get(roomId);
            if (!targetScene) {
                alert('无法定位该房间所在的场景！');
                return;
            }
            jumpToScene(targetScene, roomId);
        }

        function guideToRoom(roomId) {
            const targetScene = roomToScene.get(roomId);
            if (!targetScene) {
                alert('无法定位该房间所在的场景！');
                return;
            }
            if (currentSceneId === targetScene) {
                showArrived(targetScene, roomId);
                return;
            }
            guideTo(targetScene, roomId);
        }

        // ======================= 5. 智能导航（BFS 逐步引导） =======================
        function findShortestPath(start, target) {
            if (start === target) return [start];
            let queue = [[start]], visited = new Set([start]);
            while (queue.length) {
                let path = queue.shift(), last = path[path.length-1];
                for (let neighbor of connections.get(last) || []) {
                    if (neighbor === target) return [...path, neighbor];
                    if (!visited.has(neighbor)) {
                        visited.add(neighbor);
                        queue.push([...path, neighbor]);
                    }
                }
            }
            return null;
        }
        function getNextHotspotText(from, to) {
            const hs = scenesConfig[from]?.hotSpots || [];
            const found = hs.find(h => h.sceneId === to);
            return found ? found.text : `前往 ${to}`;
        }
        function guideTo(destinationId, roomLabel) {
            if (!destinationId) { document.getElementById("routeResult").style.display = "none"; return; }
            const roomHint = roomLabel ? `（房间 ${roomLabel}）` : '';
            if (currentSceneId === destinationId) {
                showArrived(destinationId, roomLabel);
                return;
            }
            const path = findShortestPath(currentSceneId, destinationId);
            if (!path) {
                document.getElementById("routeResult").style.display = "block";
                document.getElementById("routeResult").innerHTML = `<div style="color:#e74c3c;">❌ 无法找到从 ${currentSceneId} 到 ${destinationId} 的路径。</div>`;
                return;
            }
            const pathStr = path.join(" → ");
            const nextStepScene = path[1];
            const hint = getNextHotspotText(currentSceneId, nextStepScene);
            document.getElementById("routeResult").style.display = "block";
            document.getElementById("routeResult").innerHTML = `
                <div>🗺️ 最优路径${roomHint}：<span style="font-weight:bold;">${pathStr}</span></div>
                <div class="next-step">👉 下一步：请点击 <strong>“${hint}”</strong> 热点</div>
                <div style="margin-top:8px; font-size:12px; opacity:0.7;">💡 跟随提示点击热点，即可按路径到达目的地${roomLabel ? '，到达后点击蓝点查看 ' + roomLabel : ''}。</div>
            `;
        }

        function onSceneGuideUpdate() {
            const dest = document.getElementById("destinationSelect").value;
            if (dest) guideTo(dest);
        }

        document.getElementById("jumpBtn").addEventListener("click", function() {
            const target = getSelectedTarget();
            if (target.error) { alert(target.error); return; }
            guideModeActive = false;
            jumpToScene(target.sceneId, target.roomLabel);
        });
        document.getElementById("guideBtn").addEventListener("click", function() {
            const target = getSelectedTarget();
            if (target.error) { alert(target.error); return; }
            guideModeActive = true;
            if (target.roomLabel) guideToRoom(target.roomLabel);
            else guideTo(target.sceneId);
        });
        document.getElementById("roomSelect").addEventListener("change", function() {
            if (this.value) document.getElementById("destinationSelect").value = roomToScene.get(this.value) || '';
        });
        document.getElementById("destinationSelect").addEventListener("change", function() {
            if (this.value) document.getElementById("roomSelect").value = '';
        });

        function initNavPanel() {
            const panel = document.getElementById("navPanel");
            const head = document.getElementById("navPanelHead");
            const collapseBtn = document.getElementById("navCollapseBtn");
            const KEY = "panoNavPanel";

            function savePanelState() {
                const r = panel.getBoundingClientRect();
                localStorage.setItem(KEY, JSON.stringify({
                    x: r.left,
                    y: r.top,
                    collapsed: panel.classList.contains("collapsed")
                }));
            }

            try {
                const s = JSON.parse(localStorage.getItem(KEY) || "{}");
                if (s.collapsed) panel.classList.add("collapsed");
                if (s.x != null && s.y != null) {
                    panel.style.left = s.x + "px";
                    panel.style.top = s.y + "px";
                    panel.style.right = "auto";
                }
            } catch (e) { /* ignore */ }
            collapseBtn.textContent = panel.classList.contains("collapsed") ? "+" : "−";

            collapseBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                panel.classList.toggle("collapsed");
                collapseBtn.textContent = panel.classList.contains("collapsed") ? "+" : "−";
                savePanelState();
            });

            let dragging = false, dx = 0, dy = 0;
            function startDrag(clientX, clientY, target) {
                if (target.closest("button,select,a,input,option")) return;
                dragging = true;
                const r = panel.getBoundingClientRect();
                panel.style.right = "auto";
                panel.style.left = r.left + "px";
                panel.style.top = r.top + "px";
                dx = clientX - r.left;
                dy = clientY - r.top;
            }
            function moveDrag(clientX, clientY) {
                if (!dragging) return;
                const w = panel.offsetWidth, h = panel.offsetHeight;
                const x = Math.max(8, Math.min(window.innerWidth - w - 8, clientX - dx));
                const y = Math.max(8, Math.min(window.innerHeight - h - 8, clientY - dy));
                panel.style.left = x + "px";
                panel.style.top = y + "px";
            }
            function endDrag() {
                if (!dragging) return;
                dragging = false;
                savePanelState();
            }

            head.addEventListener("mousedown", (e) => startDrag(e.clientX, e.clientY, e.target));
            head.addEventListener("touchstart", (e) => {
                const t = e.touches[0];
                startDrag(t.clientX, t.clientY, e.target);
            }, { passive: true });
            window.addEventListener("mousemove", (e) => moveDrag(e.clientX, e.clientY));
            window.addEventListener("touchmove", (e) => {
                if (!dragging) return;
                e.preventDefault();
                const t = e.touches[0];
                moveDrag(t.clientX, t.clientY);
            }, { passive: false });
            window.addEventListener("mouseup", endDrag);
            window.addEventListener("touchend", endDrag);
        }

        buildRoomIndex();
        initNavPanel();
        switchToScene(firstScene);

        let roomPointTotal = 0;
        for (const rooms of Object.values(roomDataByScene)) roomPointTotal += rooms.length;
        console.log("全景已启动（最近 " + SCENE_CACHE_MAX + " 场景缓存）：场景 " + allScenes.length + "，房间标注场景 " + Object.keys(roomDataByScene).length + "，房间点 " + roomPointTotal);
    </script>
</body>
