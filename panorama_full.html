            const opt = document.createElement("option");
            opt.value = scene; opt.textContent = scene;
            destSelect.appendChild(opt);
        });

        // ======================= 2. 构建连接图（用于导航）=======================
        const connections = new Map();
        allScenes.forEach(s => connections.set(s, []));

            if (!connections.get(a).includes(b)) connections.get(a).push(b);
            if (!connections.get(b).includes(a)) connections.get(b).push(a);
        }

        // 二栋楼层内连接
        function addErdongFloor(floor, maxNum) {
            const ids = [];
            for (let i = 1; i <= maxNum; i++) ids.push(`二栋-${floor}f-${i}`);
            if (maxNum >= 2) addLink(ids[0], ids[1]);
            if (maxNum >= 3) addLink(ids[0], ids[2]);
            if (maxNum >= 4) {
                addLink(ids[1], ids[3]);
                addLink(ids[2], ids[3]);
            }
            if (maxNum === 5) {
                addLink(ids[3], ids[4]);
                addLink(ids[4], ids[1]);
                addLink(ids[4], ids[3]);
            } else if (maxNum === 4) {
                addLink(ids[3], ids[1]);
                addLink(ids[3], ids[2]);
            }
        }
        for (let f = 1; f <= 2; f++) addErdongFloor(f, 5);
        for (let f = 3; f <= 5; f++) addErdongFloor(f, 4);
        for (let f = 1; f <= 4; f++) {
            const cur1 = `二栋-${f}f-1`, up1 = `二栋-${f+1}f-1`;
            if (allScenes.includes(up1)) addLink(cur1, up1);
            const cur4 = `二栋-${f}f-4`, up4 = `二栋-${f+1}f-4`;
            if (allScenes.includes(up4)) addLink(cur4, up4);
        }

            addLink(ids[2], ids[3]);
            addLink(ids[3], ids[2]);
            addLink(ids[3], ids[4]);

                let path = queue.shift(), last = path[path.length-1];
                for (let neighbor of connections.get(last) || []) {
                    if (neighbor === target) return [...path, neighbor];
                    if (!visited.has(neighbor)) {
                        visited.add(neighbor);
                        queue.push([...path, neighbor]);
                    }
                }
            }
            return null;
        }
        function getNextHotspotText(from, to) {
            const hs = scenesConfig[from]?.hotSpots || [];
            const found = hs.find(h => h.sceneId === to);
            return found ? found.text : `前往 ${to}`;
        }
        function navigateTo(destinationId) {
            if (!destinationId) { document.getElementById("routeResult").style.display = "none"; return; }
            if (currentSceneId === destinationId) {
                document.getElementById("routeResult").style.display = "block";
                document.getElementById("routeResult").innerHTML = `<div style="color:#2ecc71;">✅ 您已在目标场景 ${destinationId}</div>`;
                return;
            }
            const path = findShortestPath(currentSceneId, destinationId);
            if (!path) {
                document.getElementById("routeResult").style.display = "block";
                document.getElementById("routeResult").innerHTML = `<div style="color:#e74c3c;">❌ 无法找到从 ${currentSceneId} 到 ${destinationId} 的路径。</div>`;
                return;
            }
            const pathStr = path.join(" → ");
            const nextStepScene = path[1];
            const hint = getNextHotspotText(currentSceneId, nextStepScene);
            document.getElementById("routeResult").style.display = "block";
            document.getElementById("routeResult").innerHTML = `
                <div>🗺️ 最优路径：<span style="font-weight:bold;">${pathStr}</span></div>
                <div class="next-step">👉 下一步：请点击 <strong>“${hint}”</strong> 热点</div>
                <div style="margin-top:8px; font-size:12px; opacity:0.7;">💡 跟随提示点击热点，即可按路径到达目的地。</div>
            `;
        }
        document.getElementById("navigateBtn").addEventListener("click", function() {
            const dest = document.getElementById("destinationSelect").value;
            if (!dest) { alert("请选择目的地！"); return; }
            navigateTo(dest);
        });

        console.log("全景导航已启动，共 " + allScenes.length + " 个场景。");
    </script>
</body>
</html>
