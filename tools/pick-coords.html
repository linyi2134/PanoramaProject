<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>A/B 座 CAD 节点坐标标注</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--border:#21262d;
  --accent:#58a6ff;--green:#3fb950;--orange:#f0883e;--muted:#6e7681;--text:#c9d1d9;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;flex-shrink:0;}
header h1{font-size:15px;color:var(--accent);font-weight:700;margin-right:4px;}
header select,header button,header label{font-size:12px;}
select,button,input[type=file]{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;}
button:hover{border-color:var(--accent);color:var(--accent);}
button:disabled{opacity:.45;cursor:not-allowed;}
.btn-primary{border-color:var(--accent);color:var(--accent);font-weight:600;}
.hint{font-size:11px;color:var(--muted);max-width:100%;line-height:1.4;flex:1 1 100%;}
.main{display:flex;flex:1;min-height:0;}
.map-pane{flex:1;position:relative;overflow:hidden;background:#080c12;display:flex;align-items:center;justify-content:center;}
#wrap{width:100%;height:100%;cursor:grab;}
#wrap.dragging-map{cursor:grabbing;}
#canvas{display:block;max-width:100%;max-height:100%;touch-action:none;}
.side{width:310px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.side-hd{padding:10px 12px;border-bottom:1px solid var(--border);}
.side-hd h2{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
#search{width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;margin-bottom:6px;}
.nav-row{display:flex;gap:6px;margin-bottom:6px;}
.nav-row button{flex:1;}
.node-list{flex:1;overflow-y:auto;padding:6px;}
.node-item{padding:6px 8px;border-radius:6px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;border:1px solid transparent;margin-bottom:2px;}
.node-item:hover{background:var(--border);}
.node-item.active{border-color:var(--accent);background:rgba(88,166,255,.12);}
.node-item.done{border-left:3px solid var(--green);}
.ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nid{color:var(--muted);font-size:10px;}
.coords{padding:10px 12px;border-top:1px solid var(--border);font-size:11px;line-height:1.6;}
.coords b{color:var(--accent);}
.status{padding:8px 12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);}
.chk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);cursor:pointer;}
.meta-line{font-size:10px;color:var(--muted);}
footer{padding:6px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);line-height:1.5;}
a{color:var(--accent);}
code{font-size:10px;}
</style>
</head>
<body>
<header>
  <h1>CAD 取点</h1>
  <label>分区
    <select id="zoneSel">
      <option value="b">B 座（软件学院）</option>
      <option value="a">A 座（办公楼）</option>
    </select>
  </label>
  <label>楼层
    <select id="floorSel"></select>
  </label>
  <label>类型
    <select id="roleFilter">
      <option value="">全部</option>
      <option value="corridor">走廊</option>
      <option value="door">门</option>
      <option value="vertical">楼梯/电梯</option>
      <option value="facility">设施</option>
      <option value="room">房间</option>
    </select>
  </label>
  <label class="chk"><input type="checkbox" id="showEdges" checked> 边</label>
  <label class="chk"><input type="checkbox" id="showLabels" checked> 标签</label>
  <label class="chk"><input type="checkbox" id="loadFromJson"> 从 graph 读已有坐标</label>
  <button type="button" id="btnReset">重置网格</button>
  <button type="button" id="btnReload">重新加载 JSON</button>
  <button type="button" id="btnImport">导入 JSON</button>
  <input type="file" id="fileImport" accept=".json,application/json" hidden>
  <button type="button" class="btn-primary" id="btnExport">导出 cad_pick</button>
  <button type="button" id="btnCopy">复制 JSON</button>
  <p class="hint">本地服务打开本页。PDF 命名见 <code>map_data/cad_sources.json</code>。导出 → <code>map_data/</code> → <code>apply_cad_coords.py</code>。</p>
</header>
<div class="main">
  <div class="map-pane">
    <div id="wrap">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
        <g id="gPlan"></g>
        <g id="gEdges"></g>
        <g id="gNodes"></g>
      </svg>
    </div>
  </div>
  <aside class="side">
    <div class="side-hd">
      <h2>节点 <span id="nodeCount">—</span></h2>
      <input type="search" id="search" placeholder="搜索 id / 中文名…">
      <div class="nav-row">
        <button type="button" id="btnPrev">← 上一个</button>
        <button type="button" id="btnNext">下一个 →</button>
      </div>
      <p class="meta-line" id="pdfSrc">—</p>
    </div>
    <div class="node-list" id="nodeList"></div>
    <div class="coords" id="coordPanel">未选中</div>
    <div class="status" id="status">—</div>
  </aside>
</div>
<footer>
  底图 <span id="planInfo">—</span> · 路网 <span id="graphInfo">—</span> ·
  <a href="../map.html">map</a> ·
  <code id="cmdHint">—</code>
</footer>
<script>
const NS='http://www.w3.org/2000/svg';

/** key = zone + floor；plan 为 plans/*_cad.png */
const PICK_CFG={
  'b_1':{graph:'../node_nav/data/f1_b_graph.json',plan:'../plans/f1_b_cad.png',pdf:'1_2_5F-B.pdf',exportName:'cad_pick_f1_b.json'},
  'b_2':{graph:'../node_nav/data/f2_b_graph.json',plan:'../plans/f2_b_cad.png',pdf:'1_2_5F-B.pdf',exportName:'cad_pick_f2_b.json'},
  'b_3':{graph:'../node_nav/data/f3_b_graph.json',plan:'../plans/f3_b_cad.png',pdf:'3_4F-B.pdf',exportName:'cad_pick_f3_b.json'},
  'b_4':{graph:'../node_nav/data/f4_b_graph.json',plan:'../plans/f4_b_cad.png',pdf:'3_4F-B.pdf',exportName:'cad_pick_f4_b.json'},
  'b_5':{graph:'../node_nav/data/f5_b_graph.json',plan:'../plans/f5_b_cad.png',pdf:'1_2_5F-B.pdf',exportName:'cad_pick_f5_b.json'},
  'a_1':{graph:'../node_nav/data/f1_a_graph.json',plan:'../plans/f1_a_cad.png',pdf:'1F-A.pdf',exportName:'cad_pick_f1_a.json'},
  'a_2':{graph:'../node_nav/data/f2_a_graph.json',plan:'../plans/f2_a_cad.png',pdf:'2F-A.pdf',exportName:'cad_pick_f2_a.json'},
  'a_3':{graph:'../node_nav/data/f3_a_graph.json',plan:'../plans/f3_a_cad.png',pdf:'3F-A.pdf',exportName:'cad_pick_f3_a.json'},
  'a_4':{graph:'../node_nav/data/f4_a_graph.json',plan:'../plans/f4_a_cad.png',pdf:'4F-A.pdf',exportName:'cad_pick_f4_a.json'},
  'a_5':{graph:'../node_nav/data/f5_a_graph.json',plan:'../plans/f5_a_cad.png',pdf:'5F-A.pdf',exportName:'cad_pick_f5_a.json'},
};

const ROLE_COL={
  corridor:'#58a6ff',door:'#f0883e',vertical:'#cf4fff',facility:'#3fb950',room:'#e8aa70'
};

let zone='b', floor=1, graph=null, cfg=null;
let planW=760, planH=520, planSrc='';
let positions={};
let selectedId=null, dragNodeId=null;
let panning=false, panStart=null, viewPan={x:0,y:0}, viewScale=1;
let orderedIds=[];

const canvas=document.getElementById('canvas');
const gPlan=document.getElementById('gPlan');
const gEdges=document.getElementById('gEdges');
const gNodes=document.getElementById('gNodes');

function cfgKey(){ return `${zone}_${floor}`; }
function storageKey(){ return `cad_pick_v2_${cfgKey()}`; }

function svg(tag,a,txt){
  const e=document.createElementNS(NS,tag);
  for(const[k,v] of Object.entries(a||{})) e.setAttribute(k,v);
  if(txt!=null) e.textContent=txt;
  return e;
}

function rebuildFloorOptions(){
  const sel=document.getElementById('floorSel');
  sel.innerHTML='';
  for(let f=1;f<=5;f++){
    const o=document.createElement('option');
    o.value=String(f);
    o.textContent=`${f}F`;
    sel.appendChild(o);
  }
  sel.value=String(floor);
}

function getCfg(){ return PICK_CFG[cfgKey()]; }

function filteredNodes(){
  if(!graph) return [];
  const role=document.getElementById('roleFilter').value;
  const q=(document.getElementById('search').value||'').trim().toLowerCase();
  return graph.nodes.filter(n=>{
    if(role && n.role!==role) return false;
    if(q && !n.id.toLowerCase().includes(q) && !(n.label||'').includes(q)) return false;
    return true;
  });
}

function rebuildOrder(){
  orderedIds=filteredNodes().map(n=>n.id);
}

function isPlaced(id){
  const p=positions[id];
  if(!p) return false;
  return p.x>0 && p.y>0;
}

function saveLocal(){
  try{ localStorage.setItem(storageKey(), JSON.stringify(buildExportPayload())); }catch(e){}
}

function loadLocal(){
  try{
    const raw=localStorage.getItem(storageKey());
    if(!raw) return false;
    const data=JSON.parse(raw);
    if(data.coords){
      for(const[id,c] of Object.entries(data.coords)){
        if(c&&c.x_px!=null) positions[id]={x:+c.x_px,y:+c.y_px};
      }
      return true;
    }
  }catch(e){}
  return false;
}

function loadFromGraphCoords(){
  if(!graph) return false;
  let n=0;
  for(const node of graph.nodes){
    if(node.x_px!=null&&node.y_px!=null){
      positions[node.id]={x:+node.x_px,y:+node.y_px};
      n++;
    }
  }
  return n>0;
}

function initialGrid(onlyIds=null){
  if(!graph) return;
  const ids=onlyIds||graph.nodes.map(n=>n.id);
  if(!ids.length) return;
  const cols=Math.ceil(Math.sqrt(ids.length));
  const margin=24;
  const cellW=(planW-margin*2)/cols;
  const rows=Math.ceil(ids.length/cols);
  const cellH=(planH-margin*2)/rows;
  ids.forEach((id,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    positions[id]={
      x:Math.round(margin+cellW*(col+0.5)),
      y:Math.round(margin+cellH*(row+0.5)),
    };
  });
}

/** 与 graph.nodes 对齐：删掉已不存在的 id，为新节点补网格位置 */
function syncPositionsWithGraph(){
  if(!graph) return;
  const ids=new Set(graph.nodes.map(n=>n.id));
  for(const id of Object.keys(positions)){
    if(!ids.has(id)) delete positions[id];
  }
  const missing=graph.nodes.filter(n=>positions[n.id]==null).map(n=>n.id);
  if(missing.length) initialGrid(missing);
}

function svgPoint(clientX,clientY){
  const pt=canvas.createSVGPoint();
  pt.x=clientX; pt.y=clientY;
  const ctm=canvas.getScreenCTM();
  if(!ctm) return {x:0,y:0};
  const p=pt.matrixTransform(ctm.inverse());
  return {x:Math.round(p.x),y:Math.round(p.y)};
}

function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

function setViewBox(){
  const w=planW/viewScale, h=planH/viewScale;
  canvas.setAttribute('viewBox',`${viewPan.x} ${viewPan.y} ${w} ${h}`);
}

function updateStatusLine(){
  const total=graph?graph.nodes.length:0;
  const placed=graph?graph.nodes.filter(n=>isPlaced(n.id)).length:0;
  document.getElementById('nodeCount').textContent=`${placed}/${total}`;
}

async function loadLayer(z,f){
  zone=z; floor=f;
  cfg=getCfg();
  if(!cfg) throw new Error('无配置 '+cfgKey());

  document.getElementById('planInfo').textContent=cfg.plan.replace('../','');
  document.getElementById('graphInfo').textContent=cfg.graph.replace('../','');
  document.getElementById('pdfSrc').textContent='源 PDF: '+cfg.pdf;
  document.getElementById('cmdHint').textContent=
    `python node_nav/scripts/apply_cad_coords.py map_data/${cfg.exportName}`;

  const [gr,img]=await Promise.all([
    fetch(cfg.graph).then(r=>{if(!r.ok)throw new Error('graph '+r.status);return r.json();}),
    loadImage(cfg.plan),
  ]);
  graph=gr;
  planSrc=cfg.plan;
  planW=img.naturalWidth;
  planH=img.naturalHeight;
  viewPan={x:0,y:0}; viewScale=1;

  gPlan.innerHTML='';
  gPlan.appendChild(svg('image',{
    href:cfg.plan,x:0,y:0,width:planW,height:planH,preserveAspectRatio:'none'
  }));

  positions={};
  const fromLs=loadLocal();
  const fromJson=document.getElementById('loadFromJson').checked && loadFromGraphCoords();
  if(fromLs){
    syncPositionsWithGraph();
    setStatus('已恢复浏览器草稿，并与 graph JSON 节点列表同步');
  }else if(fromJson){
    syncPositionsWithGraph();
    setStatus('已从 graph JSON 加载 x_px/y_px');
  }else{
    initialGrid();
    setStatus('网格初始位置（节点来自 graph JSON）');
  }
  if(!selectedId||!positions[selectedId]) selectedId=graph.nodes[0]?.id||null;
  rebuildOrder();
  render();
  buildNodeList();
  updateStatusLine();
}

function loadImage(src){
  return new Promise((res,rej)=>{
    const im=new Image();
    im.onload=()=>res(im);
    im.onerror=()=>rej(new Error('底图加载失败: '+src+'（先运行 export_all_cad_plans.py）'));
    im.src=src;
  });
}

function render(){
  setViewBox();
  const showE=document.getElementById('showEdges').checked;
  const showL=document.getElementById('showLabels').checked;
  gEdges.innerHTML='';
  if(showE&&graph){
    for(const e of graph.edges||[]){
      const a=positions[e.from],b=positions[e.to];
      if(!a||!b) continue;
      gEdges.appendChild(svg('line',{
        x1:a.x,y1:a.y,x2:b.x,y2:b.y,
        stroke:'#3fb950','stroke-width':'1.2',opacity:'0.45'
      }));
    }
  }
  gNodes.innerHTML='';
  const list=filteredNodes();
  for(const n of list){
    const p=positions[n.id];
    if(!p) continue;
    const col=ROLE_COL[n.role]||'#888';
    const sel=n.id===selectedId;
    const g=svg('g',{'data-id':n.id,class:'node-g'});
    if(sel) g.appendChild(svg('circle',{cx:p.x,cy:p.y,r:14,fill:col,opacity:'0.2'}));
    g.appendChild(svg('circle',{
      cx:p.x,cy:p.y,r:sel?9:7,
      fill:sel?col:'#0d1117',stroke:col,'stroke-width':sel?'2.5':'1.5',
      opacity:'0.95',style:'cursor:grab'
    }));
    if(showL){
      g.appendChild(svg('text',{
        x:p.x+10,y:p.y+4,'font-size':'10',fill:'#c9d1d9',
        'font-family':'Segoe UI,sans-serif','pointer-events':'none'
      },n.label||n.id));
    }
    g.addEventListener('pointerdown',ev=>onNodeDown(ev,n.id));
    gNodes.appendChild(g);
  }
  highlightListItem();
  updateCoordPanel();
  updateStatusLine();
}

function buildNodeList(){
  const el=document.getElementById('nodeList');
  el.innerHTML='';
  rebuildOrder();
  for(const n of filteredNodes()){
    const row=document.createElement('div');
    row.className='node-item'+(n.id===selectedId?' active':'')+(isPlaced(n.id)?' done':'');
    row.dataset.id=n.id;
    const dot=document.createElement('span');
    dot.className='ndot';
    dot.style.background=ROLE_COL[n.role]||'#888';
    row.appendChild(dot);
    const txt=document.createElement('span');
    txt.innerHTML=`<b>${n.label||n.id}</b><br><span class="nid">${n.id}</span>`;
    row.appendChild(txt);
    row.addEventListener('click',()=>{ selectedId=n.id; render(); buildNodeList(); });
    el.appendChild(row);
  }
}

function highlightListItem(){
  document.querySelectorAll('.node-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.id===selectedId);
  });
  const active=document.querySelector('.node-item.active');
  if(active) active.scrollIntoView({block:'nearest'});
}

function updateCoordPanel(){
  const el=document.getElementById('coordPanel');
  if(!selectedId||!positions[selectedId]){ el.textContent='点击列表或地图上的点'; return; }
  const n=graph.nodes.find(x=>x.id===selectedId);
  const p=positions[selectedId];
  const idx=orderedIds.indexOf(selectedId);
  el.innerHTML=`<b>${n?.label||selectedId}</b> (${idx+1}/${orderedIds.length})<br>
    id: <code>${selectedId}</code><br>
    x_px: <b>${p.x}</b> · y_px: <b>${p.y}</b><br>
    role: ${n?.role||'—'}`;
}

function setStatus(msg){ document.getElementById('status').textContent=msg; }

function buildExportPayload(){
  const coords={};
  if(!graph) return {schemaVersion:2,floor,zone:zone.toUpperCase(),coords};
  for(const n of graph.nodes){
    const p=positions[n.id];
    if(p) coords[n.id]={x_px:p.x,y_px:p.y};
  }
  const z=zone.toUpperCase();
  return{
    schemaVersion:2,
    floor,zone:z,
    description:graph?.description||`${floor}F-${z}座`,
    planImage:planSrc.replace(/^\.\.\//,''),
    planWidth:planW,planHeight:planH,
    pdfSource:cfg?.pdf,
    graphFile:`node_nav/data/f${floor}_${zone}_graph.json`,
    note:'tools/pick-coords.html 导出；运行 apply_cad_coords.py 写回。',
    coords,
  };
}

function selectSibling(delta){
  if(!orderedIds.length) return;
  let i=orderedIds.indexOf(selectedId);
  if(i<0) i=0;
  i=(i+delta+orderedIds.length)%orderedIds.length;
  selectedId=orderedIds[i];
  render();
  buildNodeList();
}

function downloadExport(){
  const payload=buildExportPayload();
  const blob=new Blob([JSON.stringify(payload,null,2)+'\n'],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=cfg.exportName;
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus('已下载 '+cfg.exportName);
}

function onNodeDown(ev,id){
  ev.preventDefault(); ev.stopPropagation();
  selectedId=id; dragNodeId=id;
  ev.target.setPointerCapture?.(ev.pointerId);
  render(); buildNodeList();
}

function onPointerMove(ev){
  if(dragNodeId){
    const p=svgPoint(ev.clientX,ev.clientY);
    positions[dragNodeId]={x:clamp(p.x,0,planW),y:clamp(p.y,0,planH)};
    render(); saveLocal();
    return;
  }
  if(panning&&panStart){
    const p=svgPoint(ev.clientX,ev.clientY);
    const dx=(panStart.x-p.x)/viewScale, dy=(panStart.y-p.y)/viewScale;
    viewPan.x=clamp(panStart.vx+dx,0,Math.max(0,planW-planW/viewScale));
    viewPan.y=clamp(panStart.vy+dy,0,Math.max(0,planH-planH/viewScale));
    setViewBox();
  }
}

function onPointerUp(){
  if(dragNodeId){ dragNodeId=null; saveLocal(); setStatus('已自动保存草稿'); }
  panning=false; panStart=null;
  document.getElementById('wrap').classList.remove('dragging-map');
}

document.addEventListener('pointermove',onPointerMove);
document.addEventListener('pointerup',onPointerUp);
document.addEventListener('pointercancel',onPointerUp);

document.getElementById('wrap').addEventListener('pointerdown',ev=>{
  if(ev.target.closest('.node-g')||ev.button!==0) return;
  panning=true;
  const p=svgPoint(ev.clientX,ev.clientY);
  panStart={x:p.x,y:p.y,vx:viewPan.x,vy:viewPan.y};
  document.getElementById('wrap').classList.add('dragging-map');
});

canvas.addEventListener('wheel',ev=>{
  ev.preventDefault();
  const factor=ev.deltaY<0?1.12:1/1.12;
  const next=clamp(viewScale*factor,0.25,6);
  const p=svgPoint(ev.clientX,ev.clientY);
  const w=planW/viewScale,h=planH/viewScale;
  const nx=planW/next, ny=planH/next;
  viewPan.x=clamp(p.x-(p.x-viewPan.x)*nx/w,0,Math.max(0,planW-nx));
  viewPan.y=clamp(p.y-(p.y-viewPan.y)*ny/h,0,Math.max(0,planH-ny));
  viewScale=next;
  setViewBox();
},{passive:false});

document.getElementById('zoneSel').addEventListener('change',e=>{
  zone=e.target.value;
  loadLayer(zone,floor).catch(err=>setStatus('加载失败: '+err.message));
});
document.getElementById('floorSel').addEventListener('change',e=>{
  saveLocal();
  floor=+e.target.value;
  loadLayer(zone,floor).catch(err=>setStatus('加载失败: '+err.message));
});
document.getElementById('roleFilter').addEventListener('change',()=>{ rebuildOrder(); render(); buildNodeList(); });
document.getElementById('showEdges').addEventListener('change',render);
document.getElementById('showLabels').addEventListener('change',render);
document.getElementById('search').addEventListener('input',()=>{ rebuildOrder(); render(); buildNodeList(); });
document.getElementById('btnPrev').addEventListener('click',()=>selectSibling(-1));
document.getElementById('btnNext').addEventListener('click',()=>selectSibling(1));
document.getElementById('btnReset').addEventListener('click',()=>{
  if(!confirm('重置为网格？')) return;
  initialGrid(); saveLocal(); render(); buildNodeList();
  setStatus('已重置网格');
});
document.getElementById('btnReload').addEventListener('click',()=>{
  if(!confirm('清除本层浏览器草稿并重新读取 graph JSON？未导出的拖点将丢失。')) return;
  try{ localStorage.removeItem(storageKey()); }catch(e){}
  loadLayer(zone,floor).catch(err=>setStatus('加载失败: '+err.message));
});
document.getElementById('btnExport').addEventListener('click',downloadExport);
document.getElementById('btnCopy').addEventListener('click',async()=>{
  await navigator.clipboard.writeText(JSON.stringify(buildExportPayload(),null,2));
  setStatus('JSON 已复制');
});
document.getElementById('btnImport').addEventListener('click',()=>document.getElementById('fileImport').click());
document.getElementById('fileImport').addEventListener('change',ev=>{
  const f=ev.target.files?.[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(data.planWidth) planW=data.planWidth;
      if(data.planHeight) planH=data.planHeight;
      for(const[id,c] of Object.entries(data.coords||{})){
        positions[id]={x:+c.x_px,y:+c.y_px};
      }
      saveLocal(); render(); buildNodeList();
      setStatus('已导入 '+f.name);
    }catch(e){ setStatus('导入失败: '+e.message); }
  };
  r.readAsText(f,'utf-8');
  ev.target.value='';
});

document.addEventListener('keydown',ev=>{
  if(ev.target.matches('input,select,textarea')) return;
  if(ev.key==='ArrowRight'||ev.key==='n') selectSibling(1);
  if(ev.key==='ArrowLeft'||ev.key==='p') selectSibling(-1);
});

rebuildFloorOptions();
loadLayer('b',1).catch(err=>setStatus('加载失败: '+err.message));
</script>
</body>
</html>
