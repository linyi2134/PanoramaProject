<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>B7软件学院室内导航</title>
<style>
:root{
  --bg:#eef6fc;--surface:#f8fbfe;--border:#c5dff0;
  --accent:#1a7fd4;--accent2:#d97706;--green:#1a8f4a;--red:#d1242f;
  --purple:#9b3dd4;--yellow:#b8860b;
  --text:#1e3a52;--muted:#5a7080;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 16px 14px;display:flex;align-items:center;flex-wrap:wrap;gap:10px 8px;flex-shrink:0;min-height:88px;}
.logo{font-weight:700;font-size:22px;color:var(--accent);flex:1 1 auto;}
.floor-tabs{display:flex;gap:6px;overflow-x:auto;flex:1 1 100%;order:3;max-width:100%;scrollbar-width:none;padding:4px 0 2px;}
.floor-tab{padding:10px 18px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-size:18px;font-family:inherit;transition:all .15s;white-space:nowrap;}
.floor-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.hdr-btns{margin-left:auto;display:flex;flex-wrap:wrap;gap:8px;order:2;}
.btn{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;font-size:18px;font-family:inherit;transition:all .15s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-toilet{border-color:var(--accent2);color:var(--accent2);}
.btn-toilet:hover{background:var(--accent2);color:#fff;}
.btn-on{border-color:var(--accent);color:var(--accent);background:rgba(26,127,212,.12);}
.main{display:flex;flex:1;overflow:hidden;}
.map-wrap{flex:1;position:relative;overflow:hidden;background:#d4eaf7;}
#mapSvg{width:100%;height:100%;display:block;}
.hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:17px;color:var(--text);background:rgba(255,255,255,.88);padding:8px 16px;border-radius:14px;pointer-events:none;white-space:nowrap;border:1px solid var(--border);}
.side{width:320px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sec{padding:16px;border-bottom:1px solid var(--border);}
.sec h3{font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.pt-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:14px 12px;margin-left:-8px;margin-right:-8px;border-radius:10px;border:2px solid transparent;cursor:pointer;transition:background .12s,border-color .12s;min-height:56px;}
.pt-row:hover{background:var(--border);}
.pt-row.active{border-color:var(--accent);background:rgba(88,166,255,.08);}
.pt-row.active-end{border-color:var(--red);background:rgba(248,81,73,.08);}
.pt-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;}
.pt-val{font-size:17px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pt-lbl{font-size:20px;font-weight:700;color:var(--muted);flex-shrink:0;min-width:2.5em;}
#routeResult{margin-top:12px;}
.dist{font-size:20px;color:var(--accent2);font-weight:700;}
.steps{margin-top:10px;max-height:280px;overflow-y:auto;}
.step{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:17px;line-height:1.45;}
.snum{background:var(--border);border-radius:4px;padding:2px 8px;font-size:15px;color:var(--muted);flex-shrink:0;margin-top:2px;}
.sfloor{color:var(--accent);font-weight:700;font-size:17px;}
.room-list{flex:1;overflow-y:auto;padding:10px;}
.room-item{padding:10px 12px;border-radius:6px;font-size:17px;cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:10px;}
.room-item:hover{background:var(--border);}
.rdot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.legend{display:flex;flex-direction:column;gap:8px;}
.leg{display:flex;align-items:center;gap:10px;font-size:17px;}
.ldot{width:12px;height:12px;border-radius:50%;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.pano-modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100;}
.pano-modal[hidden]{display:none;}
.pano-modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.45);}
.pano-modal-box p{font-size:18px;line-height:1.55;margin-bottom:16px;color:var(--text);}
.pano-modal-btns{display:flex;gap:10px;}
.pano-modal-btns button{flex:1;padding:12px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:18px;font-family:inherit;}
.pano-modal-btns button:hover{border-color:var(--accent);color:var(--accent);}
.pano-modal-btns .pano-go{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.pano-modal-btns .pano-go:hover{filter:brightness(1.08);}
.map-zoom{position:absolute;bottom:16px;right:16px;z-index:20;display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.92);border:1px solid var(--border);padding:6px 8px;border-radius:999px;box-shadow:0 2px 12px rgba(0,0,0,.1);pointer-events:auto;}
.map-zoom button{background:none;border:none;color:var(--text);cursor:pointer;font-family:inherit;line-height:1;width:44px;height:44px;font-size:24px;border-radius:50%;transition:background .12s;}
.map-zoom button:hover{background:var(--border);}
.map-zoom .zoom-reset{font-size:15px;width:auto;padding:0 12px;font-weight:600;}
.map-wrap.panning #mapSvg{cursor:grabbing;}
</style>
<script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
</head>
<body>
<header>
  <div class="logo">🏢 B7 软件学院 · 室内导航</div>
  <div class="floor-tabs" id="floorTabs"></div>
  <div class="hdr-btns">
    <a class="btn" href="panorama_full.html" style="text-decoration:none;display:inline-flex;align-items:center;" title="可选：52场景全景漫游（加载较慢）">🌐 全景（可选）</a>
    <button class="btn" id="btnToggleEdges" onclick="toggleShowEdges()" title="显示/隐藏路网边线（CAD 底图已可辨识通道；导航路径仍会高亮）">⬡ 路网线</button>
    <button class="btn" onclick="forceRender()" title="重新绘制地图与起终点标记">↻ 刷新</button>
    <button class="btn btn-toilet" onclick="nearestToilet()">🚻 最近厕所</button>
    <button class="btn" onclick="clearAll()">✕ 清除</button>
  </div>
</header>
<div class="main">
  <div class="map-wrap">
    <svg id="mapSvg" viewBox="0 0 760 520" preserveAspectRatio="xMidYMid meet">
      <g id="gBuild"></g><g id="gEdge"></g><g id="gPath"></g>
      <g id="gNode"></g><g id="gLabel"></g><g id="gMarkers"></g>
    </svg>
    <div class="map-zoom" id="mapZoomBar">
      <button type="button" id="zoomInBtn" title="放大">＋</button>
      <button type="button" id="zoomOutBtn" title="缩小">－</button>
      <button type="button" id="zoomResetBtn" class="zoom-reset" title="重置视图">⟳</button>
    </div>
    <div class="hint" id="hint">先点右侧「起点」，再在地图上选点；双指/滚轮可缩放地图</div>
    <div id="panoModal" class="pano-modal" hidden>
      <div class="pano-modal-box">
        <p id="panoModalText"></p>
        <div class="pano-modal-btns">
          <button type="button" class="pano-go" id="panoModalGo">🌐 进入全景</button>
          <button type="button" id="panoModalPick">📍 继续选点</button>
        </div>
      </div>
    </div>
  </div>
  <div class="side">
    <div class="sec">
      <h3>路径规划</h3>
      <div class="pt-row active" id="pickStart" onclick="setPickMode('start')" title="点击激活，再在地图上选起点">
        <div class="pt-dot" style="background:var(--green)"></div>
        <div class="pt-lbl">起点</div>
        <div class="pt-val" id="lblStart">点击地图选择</div>
      </div>
      <div class="pt-row" id="pickEnd" onclick="setPickMode('end')" title="点击激活，再在地图上选终点">
        <div class="pt-dot" style="background:var(--red)"></div>
        <div class="pt-lbl">终点</div>
        <div class="pt-val" id="lblEnd">点击地图选择</div>
      </div>
      <div id="routeResult"></div>
    </div>
    <div class="sec">
      <h3>图例</h3>
      <div class="legend">
        <div class="leg"><div class="ldot" style="background:var(--accent)"></div>走廊节点</div>
        <div class="leg"><div class="ldot" style="background:var(--accent2)"></div>设施（洗手间等）</div>
        <div class="leg"><div class="ldot" style="background:var(--green)"></div>房间</div>
        <div class="leg"><div class="ldot" style="background:var(--purple)"></div>楼梯 / 电梯</div>
        <div class="leg"><div class="ldot" style="background:var(--yellow)"></div>出入口 / 连廊</div>
      </div>
    </div>
    <div class="sec" style="padding-bottom:6px;"><h3>本层房间（点击导航）</h3></div>
    <div class="room-list" id="roomList"></div>
  </div>
</div>

async function loadJsonGraph(f){
  if(graphCache[f]) return true;
  const url=JSON_GRAPHS[f];
  if(!url) return false;
  try{
    const sep=url.includes('?')?'&':'?';
    const r=await fetch(`${url}${sep}_gv=${encodeURIComponent(GRAPH_CACHE_VER)}`);
    if(!r.ok) return false;
    const g=await r.json();
    if(g.nodes.every(n=>n.x_px!=null&&n.y_px!=null)) graphCache[f]=g;
    return !!graphCache[f];
  }catch(e){
    console.warn('JSON graph load failed',url,e);
    return false;
  }
}
async function loadJsonGraphs(floors){
  const list=(floors||Object.keys(JSON_GRAPHS).map(Number)).filter(f=>JSON_GRAPHS[f]);
  await Promise.all(list.map(f=>loadJsonGraph(f)));
}
let bgLoadGen=0;
async function loadJsonGraphsBackground(){
  const pending=Object.keys(JSON_GRAPHS).map(Number).filter(f=>!graphCache[f]);
  if(!pending.length) return;
  const gen=++bgLoadGen;
  for(let i=0;i<pending.length;i+=3){
    if(gen!==bgLoadGen) return;
    await loadJsonGraphs(pending.slice(i,i+3));
    buildNodeMap();
    if(floor&&graphCache[floor]) render();
    await new Promise(r=>setTimeout(r,0));
  }
}

function pushChainEdges(out,chain,w){
  const nodes=chain.nodes||[];
  for(let i=0;i<nodes.length-1;i++){
    const a=navNodeId(nodes[i].tab,nodes[i].nodeId);
    const b=navNodeId(nodes[i+1].tab,nodes[i+1].nodeId);
    if(a!==b) out.push([a,b,w]);
  }
}
function crossEdges(){
  const out=[];
  const w0=crossFloorSpec?.crossFloorWeight??6;
  const bVert=crossFloorSpec?.bZone?.unifiedVertical||{};
  for(const[nodeId,spec] of Object.entries(bVert)){
    const tabs=spec.tabs||[];
    for(let i=0;i<tabs.length-1;i++){
      const a=navNodeId(tabs[i],nodeId), b=navNodeId(tabs[i+1],nodeId);
      if(a!==b) out.push([a,b,w0]);
    }
  }
  if(crossFloorSpec?.linkCorridor){
    const{tabs,nodeId}=crossFloorSpec.linkCorridor;
    for(let i=0;i<tabs.length-1;i++) out.push([navNodeId(tabs[i],nodeId),navNodeId(tabs[i+1],nodeId),w0]);
  }
  const zw=crossFloorSpec?.zoneLinks?.crossZoneWeight??15;
  for(const z of crossFloorSpec?.zoneLinks?.pairs||[]){
    out.push([navNodeId(z.bTab,z.bNode),navNodeId(z.linkTab,z.linkNode),zw]);
    out.push([navNodeId(z.aTab,z.aNode),navNodeId(z.linkTab,'link_to_a'),zw]);
  }
  const aVert=crossFloorSpec?.aZone?.unifiedVertical||{};
  for(const[nodeId,spec] of Object.entries(aVert)){
    const tabs=spec.tabs||[];
    for(let i=0;i<tabs.length-1;i++){
      const a=navNodeId(tabs[i],nodeId), b=navNodeId(tabs[i+1],nodeId);
      if(a!==b) out.push([a,b,w0]);
    }
  }
  return out;
}

// 同层起终点禁用楼梯/电梯；A1F 小楼侧（与主楼 1F 不互通）须保留 A 座竖向边
const VERTICAL_NODE_IDS=new Set(['elevator','stair_east','stair_west','stair_south','stair_small','outdoor_stair']);
const F1_A_WING_LOCALS=new Set(['stair_small','room_104A','room_104B']);
function parseNavNodeId(id){
  let m=id.match(/^b(\d)_(.+)$/);
  if(m) return {tab:+m[1],local:m[2],zone:'b'};
  m=id.match(/^a(\d)_(.+)$/);
  if(m) return {tab:+m[1]+7,local:m[2],zone:'a'};
  m=id.match(/^lk(\d)_(.+)$/);
  if(m) return {tab:+m[1]+13,local:m[2],zone:'lk'};
  return {tab:null,local:id,zone:null};
}
function isVerticalCrossEdge(a,b){
  const pa=parseNavNodeId(a),pb=parseNavNodeId(b);
  return pa.local===pb.local&&VERTICAL_NODE_IDS.has(pa.local);
}
function isAZoneVerticalEdge(a,b){
  const pa=parseNavNodeId(a),pb=parseNavNodeId(b);
  return pa.zone==='a'&&pb.zone==='a'&&pa.local===pb.local&&
    (pa.local==='stair_south'||pa.local==='stair_small');
}
function isF1AWingNode(id){
  const p=parseNavNodeId(id);
  return p.tab===8&&F1_A_WING_LOCALS.has(p.local);
}
/** 同 tab 起终点：禁竖向边；A1F 主楼↔小楼侧跨子图时保留 A 座楼梯 */
function sameFloorVerticalPolicy(startN,endN){
  if(!startN||!endN) return null;
  const sf=allNodes[startN]?.floor,ef=allNodes[endN]?.floor;
  if(sf==null||sf!==ef) return null;
  const ws=isF1AWingNode(startN),we=isF1AWingNode(endN);
  return {keepAVert:sf===8&&ws!==we};
}

// ── 寻路（复用 js/pathfind.browser.js，与 indoor_nav / node_nav 同算法）──
function buildGraph(startN,endN){
  const nodes=[],edges=[],seen=new Set();
  for(const f of FLOOR_ORDER){
    if(!floorJsonReady(f)) continue;
    const fd=getFloorView(f);
    if(!fd?.nodes?.length) continue;
    for(const n of fd.nodes){
      if(!seen.has(n.id)){nodes.push({id:n.id});seen.add(n.id);}
    }
    for(const[a,b,w] of fd.edges||[]) edges.push({from:a,to:b,weight:w});
  }
  const ids=new Set(nodes.map(n=>n.id));
  const vertPolicy=sameFloorVerticalPolicy(startN,endN);
  for(const[a,b,w] of crossEdges()){
    if(!ids.has(a)||!ids.has(b)) continue;
    if(vertPolicy&&isVerticalCrossEdge(a,b)){
      if(vertPolicy.keepAVert&&isAZoneVerticalEdge(a,b)) edges.push({from:a,to:b,weight:w});
      continue;
    }
    edges.push({from:a,to:b,weight:w});
  }
  return {nodes,edges};
}
function runDijkstra(s,e){
  if(typeof IndoorPathfind==='undefined'){
    console.error('IndoorPathfind 未加载，请 Ctrl+F5 强刷页面');
    return null;
  }
  try{
    const r=IndoorPathfind.dijkstra(buildGraph(s,e),s,e);
    if(!r.pathNodeIds.length) return null;
    return { distance: r.distance, path: r.pathNodeIds };
  }catch(err){
    console.warn('runDijkstra',s,e,err);
    return null;
  }
}

  const ar=svg('text',{x:380,y:490,'text-anchor':'middle',fill:'#2a4060','font-size':'17','font-family':'Segoe UI,sans-serif'});
  ar.textContent='← 通过连廊连接 B7后座'; g.appendChild(ar);
}

// ── 渲染 ─────────────────────────────────────────────────────────
function updateMapViewBox(){
  const fd=getFloorView(floor);
  const w=fd?.planW||760,h=fd?.planH||520;
  document.getElementById('mapSvg').setAttribute('viewBox',`0 0 ${w} ${h}`);
}

function renderBuild(){
  const g=document.getElementById('gBuild');g.innerHTML='';
  const fd=getFloorView(floor);

  // CAD / 示意 PNG 底图（A 座 8–12 = A1F–A5F）
  if(fd.planImage){
    const planHref=fd.planImage+(fd.planImage.includes('?')?'&':'?')+'_cv='+encodeURIComponent(PLAN_CACHE_VER);
    g.appendChild(svg('image',{
      href:planHref,x:0,y:0,
      width:fd.planW||760,height:fd.planH||520,
      preserveAspectRatio:'none'
    }));
    return;
  }

  if(floor>=8){drawOfficeBuilding(g);return;}

  // 无 PNG 时回退：矢量绘制示意（B 座）
  [[20,20,195,480],
   [215,20,520,110],
   [640,130,100,260],
   [215,390,520,110]
  ].forEach(([x,y,w,h])=>{
    g.appendChild(svg('rect',{x,y,width:w,height:h,rx:2,fill:'#16202e',stroke:'#253550','stroke-width':'1'}));
  });

  // ② 庭院上空（内廊删除后向右扩大，直抵右外廊内壁）
  g.appendChild(svg('rect',{x:215,y:130,width:425,height:260,fill:'#060a10',stroke:'#253550','stroke-width':'1'}));

  // ③ 走廊（明显绘出）
  [
    [100, 25, 26, 470],   // 左翼 南北走廊
    [20,  62, 640, 26],   // 顶部 东西走廊
    [634, 75, 26, 372],   // 右外廊 南北走廊
    [20, 432, 640, 26],   // 底部 东西走廊
  ].forEach(([x,y,w,h])=>{
    g.appendChild(svg('rect',{x,y,width:w,height:h,fill:'#243550',rx:1}));
    g.appendChild(svg('rect',{x,y,width:w,height:h,fill:'none',stroke:'#3a5575','stroke-width':'0.8',rx:1}));
  });

  // 3F/4F：左翼缩窄 + 左翼与庭院间新增一排办公室
  if([3,4].includes(floor)){
    // 左翼实体（缩窄到 x=145）
    g.appendChild(svg('rect',{x:20,y:20,width:125,height:480,rx:2,fill:'#16202e',stroke:'#253550','stroke-width':'1'}));
    // 盖住原左翼多余部分（还原背景色，视觉上缩窄左翼）
    g.appendChild(svg('rect',{x:145,y:20,width:70,height:110,fill:'#060a10',stroke:'none'}));
    g.appendChild(svg('rect',{x:145,y:390,width:70,height:110,fill:'#060a10',stroke:'none'}));
    // 办公室带实体块（x=145~215，y=130~390）
    g.appendChild(svg('rect',{x:145,y:130,width:70,height:260,fill:'#192233',stroke:'#253550','stroke-width':'0.8'}));
    // 办公室带走廊（贴庭院左边）
    g.appendChild(svg('rect',{x:195,y:130,width:20,height:260,fill:'#243550',rx:1}));
    g.appendChild(svg('rect',{x:195,y:130,width:20,height:260,fill:'none',stroke:'#3a5575','stroke-width':'0.8',rx:1}));
    // 左翼走廊（缩窄后偏左，x=80）
    g.appendChild(svg('rect',{x:78,y:25,width:20,height:470,fill:'#243550',rx:1}));
    g.appendChild(svg('rect',{x:78,y:25,width:20,height:470,fill:'none',stroke:'#3a5575','stroke-width':'0.8',rx:1}));
    const ot=svg('text',{x:183,y:268,'text-anchor':'middle',fill:'#1a2d45','font-size':'16',
      'font-family':'Segoe UI,sans-serif','writing-mode':'vertical-rl'});
    ot.textContent='办公室带'; g.appendChild(ot);
  }

  // ④ 标注
  const ct=svg('text',{x:420,y:268,'text-anchor':'middle',fill:'#1a2d45','font-size':'18',
    'font-family':'Segoe UI,sans-serif','letter-spacing':'2'});
  ct.textContent='庭 院 上 空'; g.appendChild(ct);
  const ft=svg('text',{x:22,y:514,fill:'#2a4060','font-size':'17',
    'font-family':'Segoe UI,sans-serif','font-weight':'bold'});
  ft.textContent=fd.title; g.appendChild(ft);
  const arr=svg('text',{x:750,y:493,'font-size':'17',fill:'#f7f74f',
    'text-anchor':'middle','font-family':'Segoe UI,sans-serif'});
  arr.textContent='→A区'; g.appendChild(arr);
}

function renderEdges(){
  const g=document.getElementById('gEdge');
  g.innerHTML='';
  g.style.pointerEvents='none';
  g.style.display=showEdges?'':'none';
  if(!showEdges) return;
  const fd=getFloorView(floor);
  const nm={};for(const n of fd.nodes) nm[n.id]=n;
  for(const[a,b] of fd.edges){
    const na=nm[a],nb=nm[b];if(!na||!nb)continue;
    g.appendChild(svg('line',{x1:na.x,y1:na.y,x2:nb.x,y2:nb.y,stroke:'#253550','stroke-width':'1.5',opacity:'0.7'}));
  }
}

function toggleShowEdges(){
  showEdges=!showEdges;
  const btn=document.getElementById('btnToggleEdges');
  if(btn){
    btn.classList.toggle('btn-on',showEdges);
    btn.textContent=showEdges?'⬡ 隐藏路网':'⬡ 路网线';
  }
  renderEdges();
}

function renderPath(){
  const g=document.getElementById('gPath');
  g.innerHTML='';
  g.style.pointerEvents='none';
  if(!curPath)return;
  const nm={};
  for(const n of getFloorView(floor).nodes) nm[n.id]=n;
  const PATH='#ffb347';
  const PATH_GLOW='#ff8c42';
  for(let i=0;i<curPath.path.length-1;i++){
    const idA=curPath.path[i],idB=curPath.path[i+1];
    const a=nm[idA],b=nm[idB];
    if(!a||!b) continue;
    g.appendChild(svg('line',{
      x1:a.x,y1:a.y,x2:b.x,y2:b.y,
      stroke:PATH_GLOW,'stroke-width':'14','stroke-linecap':'round',opacity:'0.35'
    }));
    const ln=svg('line',{
      x1:a.x,y1:a.y,x2:b.x,y2:b.y,
      stroke:PATH,'stroke-width':'7','stroke-linecap':'round',
      'stroke-dasharray':'12,6',opacity:'1'
    });
    const an=document.createElementNS(NS,'animate');
    an.setAttribute('attributeName','stroke-dashoffset');
    an.setAttribute('values','0;-18');an.setAttribute('dur','0.65s');an.setAttribute('repeatCount','indefinite');
    ln.appendChild(an);g.appendChild(ln);
  }
}

function renderNodes(){
  const gN=document.getElementById('gNode'),gL=document.getElementById('gLabel');
  gN.innerHTML='';gL.innerHTML='';
  const onPath=new Set(curPath?curPath.path:[]);
  for(const n of getFloorView(floor).nodes||[]){
    const isS=n.id===startN,isE=n.id===endN,inP=onPath.has(n.id);
    const col=RC[n.role]||'#888';
    const r=isS||isE?12:8;
    const hasPano=typeof PanoramaMapBridge!=='undefined'&&PanoramaMapBridge.hasPanoramaLink(n.id);
    const grp=svg('g',{'data-node-id':n.id});
    grp.style.cursor='pointer';
    if(hasPano) grp.setAttribute('title','可进入对应全景场景');
    if(hasPano&&!isS&&!isE) grp.appendChild(svg('circle',{cx:n.x,cy:n.y,r:r+14,fill:'none',stroke:'#58a6ff','stroke-width':'1.5','stroke-dasharray':'3,2',opacity:'0.75','pointer-events':'none'}));
    if(inP&&!isS&&!isE) grp.appendChild(svg('circle',{cx:n.x,cy:n.y,r:r+10,fill:'#ffb347',opacity:'0.28','pointer-events':'none'}));
    grp.appendChild(svg('circle',{cx:n.x,cy:n.y,r,
      fill:inP?(isS||isE?col:'#ffb347'):(n.role==='corridor'?'#162030':col),
      stroke:inP?'#ff8c42':col,'stroke-width':inP?'3':'2',opacity:inP?'1':'0.8','pointer-events':'none'}));
    grp.appendChild(svg('circle',{cx:n.x,cy:n.y,r:28,fill:'transparent',stroke:'none','pointer-events':'all'}));
    gN.appendChild(grp);
    if(n.role!=='corridor'&&(revealedLabels.has(n.id)||isS||isE)){
      const t=svg('text',{x:n.x+r+4,y:n.y+5,'font-size':'20',fill:inP?'#ffd699':'#5a7a9a',
        'font-family':'Segoe UI,sans-serif','font-weight':'600','pointer-events':'none'});
      t.textContent=n.label;gL.appendChild(t);
    }
  }
}

function renderMarkers(){
  const g=document.getElementById('gMarkers');
  g.innerHTML='';
  g.style.pointerEvents='none';
  const nm={};
  for(const n of getFloorView(floor).nodes) nm[n.id]=n;
  for(const[id,color,lbl] of [[startN,'#3fb950','起'],[endN,'#f85149','终']]){
    if(!id||!nm[id]) continue;
    const n=nm[id];
    g.appendChild(svg('circle',{cx:n.x,cy:n.y,r:22,fill:color,opacity:'0.2'}));
    g.appendChild(svg('circle',{cx:n.x,cy:n.y,r:15,fill:'none',stroke:color,'stroke-width':'5',opacity:'1'}));
    g.appendChild(svg('circle',{cx:n.x,cy:n.y,r:10,fill:color,opacity:'0.95'}));
    const tx=svg('text',{x:n.x,y:n.y-24,'text-anchor':'middle','font-size':'20','font-weight':'700',
      fill:color,'font-family':'Segoe UI,sans-serif','pointer-events':'none'});
    tx.textContent=lbl; g.appendChild(tx);
  }
}

function render(){updateMapViewBox();renderBuild();renderEdges();renderPath();renderNodes();renderMarkers();updateSide();}

function forceRender(){render();requestAnimationFrame(()=>render());}

function syncViewToNode(id){
  const loc=findNodeOnAnyFloor(id);
  if(!loc||loc.floor===floor) return;
  floor=loc.floor;
  document.querySelectorAll('.floor-tab').forEach(t=>t.classList.toggle('active',+t.dataset.f===floor));
}

// ── 交互 ─────────────────────────────────────────────────────────
function findNodeOnAnyFloor(id){
  for(const f of FLOOR_ORDER){
    if(!floorJsonReady(f)) continue;
    const n=getFloorView(f).nodes.find(x=>x.id===id);
    if(n) return {...n,floor:f};
  }
  return null;
}

function nodePickLabel(id){
  if(!id) return '点击地图选择';
  const n=findNodeOnAnyFloor(id);
  if(!n) return id;
  const fl=FLOOR_TAB_LABELS[n.floor]||'';
  return fl ? `${n.label} · ${fl}` : n.label;
}

function setPickMode(m){
  pickMode=m;
  updatePickRows();
  const hints={
    start:'选起点：在地图上点击节点（可切换楼层/tab）',
    end:'选终点：在地图上点击节点（可切换楼层/tab）',
  };
  document.getElementById('hint').textContent=hints[m];
}

function updatePickRows(){
  const ps=document.getElementById('pickStart'),pe=document.getElementById('pickEnd');
  ps.classList.toggle('active',pickMode==='start');
  pe.classList.toggle('active-end',pickMode==='end');
}

function revealNodeLabel(id){
  if(!id||revealedLabels.has(id)) return;
  revealedLabels.add(id);
  renderNodes();
}

function applyNodePick(id){
  revealNodeLabel(id);
  if(pickMode==='start'){
    startN=id;
    curPath=null;
    setPickMode('end');
  }else{
    endN=id;
  }
  syncViewToNode(id);
  curPath=(startN&&endN)?runDijkstra(startN,endN):null;
  forceRender();
  showResult();
}

function closePanoramaModal(){
  const m=document.getElementById('panoModal');
  if(m) m.hidden=true;
  pendingPanoramaNode=null;
  pendingPanoramaScene=null;
}

function offerPanoramaJump(nodeId,sceneId){
  const n=findNodeOnAnyFloor(nodeId);
  const fl=FLOOR_TAB_LABELS[n?.floor]||'';
  pendingPanoramaNode=nodeId;
  pendingPanoramaScene=sceneId;
  document.getElementById('panoModalText').textContent=
    `当前位置：${n?.label||nodeId}${fl?' · '+fl:''}\n对应全景：${sceneId}\n是否进入该位置的全景图？`;
  document.getElementById('panoModal').hidden=false;
}

function confirmPanoramaJump(){
  if(!pendingPanoramaScene) return;
  const url=PanoramaMapBridge.panoramaUrlForScene(pendingPanoramaScene);
  window.location.href=url;
}

function onNodeClick(id){
  revealNodeLabel(id);
  const scene=typeof PanoramaMapBridge!=='undefined'?PanoramaMapBridge.nodeToPanoramaScene(id):null;
  if(scene){
    offerPanoramaJump(id,scene);
    return;
  }
  applyNodePick(id);
}

function applyStartFromPanorama(navNodeId){
  const loc=findNodeOnAnyFloor(navNodeId);
  if(!loc){
    console.warn('全景深链起点不在路网中',navNodeId);
    return;
  }
  floor=loc.floor;
  document.querySelectorAll('.floor-tab').forEach(t=>t.classList.toggle('active',+t.dataset.f===floor));
  startN=navNodeId;
  revealedLabels.add(navNodeId);
  endN=null;
  curPath=null;
  pickMode='end';
  setPickMode('end');
  forceRender();
  showResult();
  document.getElementById('hint').textContent='已从全景定位起点，请在地图上选择终点';
}

function calcPath(){
  if(!startN||!endN)return;
  curPath=runDijkstra(startN,endN);
  forceRender();
  showResult();
}

function floorChangeHow(viaNode,destTab){
  if(destTab>=14&&destTab<=18) return '经连廊';
  if(!viaNode) return '换层';
  const id=viaNode.id||'';
  if(id.includes('elevator')) return '乘电梯';
  if(id.includes('outdoor_stair')) return '经连廊户外楼梯';
  if(viaNode.role==='vertical'||id.includes('stair')) return '走楼梯';
  return '换层';
}

function showResult(){
  const div=document.getElementById('routeResult');
  if(!startN&&!endN){div.innerHTML='';return;}
  if(!startN||!endN){
    div.innerHTML=startN
      ?'<div style="color:var(--muted);font-size:17px;margin-top:10px;">已选起点，请在地图上选终点</div>'
      :'<div style="color:var(--muted);font-size:17px;margin-top:10px;">已选终点，请先选起点</div>';
    return;
  }
  if(typeof IndoorPathfind==='undefined'){
    div.innerHTML='<div style="color:var(--red);font-size:18px;margin-top:10px;">⚠️ 算路模块未加载，请 Ctrl+F5 强刷</div>';
    return;
  }
  if(!curPath){div.innerHTML='<div style="color:var(--red);font-size:18px;margin-top:10px;">❌ 未找到路径</div>';return;}
  let steps=[],prevF=null;
  for(let i=0;i<curPath.path.length;i++){
    const n=findNodeOnAnyFloor(curPath.path[i]);if(!n)continue;
    if(n.floor!==prevF){
      if(prevF!==null){
        const via=findNodeOnAnyFloor(curPath.path[i-1]);
        const dest=FLOOR_TAB_LABELS[n.floor]||`${n.floor}F`;
        const how=floorChangeHow(via,n.floor);
        steps.push({type:'floor',text:`前往 ${dest}（${how}）`});
      }
      prevF=n.floor;
    }
    if(n.role!=='corridor'||i===0||i===curPath.path.length-1)
      steps.push({type:'node',text:n.label,role:n.role});
  }
  const html=steps.map((s,i)=>s.type==='floor'
    ?`<div class="step"><span class="sfloor">🔼 ${s.text}</span></div>`
    :`<div class="step"><span class="snum">${i+1}</span><span>${s.text}</span></div>`
  ).join('');
  div.innerHTML=`<div class="dist" style="margin-top:8px;">约 ${Math.round(curPath.distance)} 米</div><div class="steps">${html}</div>`;
}

function updateSide(){
  document.getElementById('lblStart').textContent=nodePickLabel(startN);
  document.getElementById('lblEnd').textContent=nodePickLabel(endN);
  updatePickRows();
  const fd=getFloorView(floor);
  const rooms=(fd.nodes||[]).filter(n=>n.role==='room'||n.role==='facility'||n.role==='door');
  document.getElementById('roomList').innerHTML=rooms.map(n=>
    `<div class="room-item" onclick="onNodeClick('${n.id}')"><div class="rdot" style="background:${RC[n.role]||'#888'}"></div>${n.label}</div>`
  ).join('');
  const src=fd.source==='json'?' · JSON路网':' · 示意数据';
  document.querySelector('.logo').textContent=`🏢 B7 软件学院 · 室内导航${src}`;
}

function nearestToilet(){
  if(!startN){alert('请先点击地图选择当前位置（起点）');return;}
  let best=null,bestId=null;
  for(const f of FLOOR_ORDER){
    if(!floorJsonReady(f)) continue;
    const fd=getFloorView(f);
    if(!fd?.nodes?.length) continue;
    for(const tid of fd.toilets||[]){
      const r=runDijkstra(startN,tid);
      if(r&&(!best||r.distance<best.distance)){best=r;bestId=tid;}
    }
  }
  if(!best){alert('未找到洗手间路径');return;}
  endN=bestId;revealedLabels.add(bestId);pickMode='end';curPath=best;
  syncViewToNode(bestId);
  forceRender();showResult();
}

function clearAll(){
  startN=null;endN=null;curPath=null;pickMode='start';
  document.getElementById('routeResult').innerHTML='';
  setPickMode('start');
  render();
}

async function switchFloor(f){
  floor=f;
  document.querySelectorAll('.floor-tab').forEach(t=>t.classList.toggle('active',+t.dataset.f===f));
  if(JSON_GRAPHS[f]&&!graphCache[f]){
    setHint('正在加载本层地图…');
    await loadJsonGraph(f);
    buildNodeMap();
  }
  forceRender();
  resetMapZoom();
}
function setHint(text){
  const el=document.getElementById('hint');
  if(el) el.textContent=text;
}

function resetMapZoom(){
  panzoomInstance?.reset({animate:false});
}

function initMapPanzoom(){
  const svgElement=document.getElementById('mapSvg');
  const mapWrap=document.querySelector('.map-wrap');
  if(!svgElement||!mapWrap) return;
  if(typeof Panzoom==='undefined'){
    console.warn('Panzoom 未加载，缩放功能不可用');
    document.getElementById('mapZoomBar')?.style.setProperty('display','none');
    return;
  }
  panzoomInstance=Panzoom(svgElement,{
    maxScale:4,
    minScale:0.5,
    step:0.25,
    contain:'outside',
    cursor:'grab',
    touchAction:'none',
  });
  mapWrap.addEventListener('wheel',(e)=>{
    e.preventDefault();
    panzoomInstance.zoomWithWheel(e);
  },{passive:false});
  svgElement.addEventListener('panzoomstart',()=>mapWrap.classList.add('panning'));
  svgElement.addEventListener('panzoomend',()=>mapWrap.classList.remove('panning'));
  document.getElementById('zoomInBtn')?.addEventListener('click',()=>panzoomInstance.zoomIn());
  document.getElementById('zoomOutBtn')?.addEventListener('click',()=>panzoomInstance.zoomOut());
  document.getElementById('zoomResetBtn')?.addEventListener('click',()=>resetMapZoom());
}

async function init(){
  setHint('正在加载地图…');
  try{
    await Promise.all([loadJsonGraph(1),loadCrossFloorSpec()]);
  }catch(e){
    console.error('地图初始化加载失败',e);
    setHint('地图加载失败，请刷新重试');
    return;
  }
  buildNodeMap();
  document.getElementById('panoModalGo')?.addEventListener('click',confirmPanoramaJump);
  document.getElementById('panoModalPick')?.addEventListener('click',()=>{
    const id=pendingPanoramaNode;
    closePanoramaModal();
    if(id) applyNodePick(id);
  });
  document.getElementById('panoModal')?.addEventListener('click',(e)=>{
    if(e.target.id==='panoModal') closePanoramaModal();
  });
  document.getElementById('gNode').addEventListener('click',(e)=>{
    const el=e.target.closest('[data-node-id]');
    if(el) onNodeClick(el.getAttribute('data-node-id'));
  });
  document.getElementById('gPath').style.pointerEvents='none';
  document.getElementById('gEdge').style.pointerEvents='none';
  const tabs=document.getElementById('floorTabs');
  for(const f of FLOOR_ORDER){
    const b=document.createElement('button');
    b.className='floor-tab'+(f===1?' active':'');
    b.dataset.f=f;
    b.textContent=FLOOR_TAB_LABELS[f];
    b.onclick=()=>switchFloor(f);
    tabs.appendChild(b);
  }
  render();
  initMapPanzoom();
  loadJsonGraphsBackground();
  const qs=new URLSearchParams(location.search);
  const startFromPano=qs.get('start');
  if(startFromPano){
    const p=parseNavNodeId(startFromPano);
    if(p.tab&&JSON_GRAPHS[p.tab]&&!graphCache[p.tab]){
      await loadJsonGraph(p.tab);
      buildNodeMap();
      render();
    }
    applyStartFromPanorama(startFromPano);
  }else{
    setPickMode('start');
    setHint('先点右侧「起点」，再在地图上选点；双指/滚轮可缩放地图');
  }
}
window.onload=init;
</script>
