<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>B7软件学院室内导航</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--border:#21262d;
  --accent:#58a6ff;--accent2:#f0883e;--green:#3fb950;--red:#f85149;
  --purple:#cf4fff;--yellow:#f7f74f;
  --text:#c9d1d9;--muted:#6e7681;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{font-weight:700;font-size:15px;color:var(--accent);}
.floor-tabs{display:flex;gap:4px;overflow-x:auto;max-width:62vw;scrollbar-width:none;}
.floor-tab{padding:4px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;}
.floor-tab.active{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:700;}
.hdr-btns{margin-left:auto;display:flex;gap:6px;}
.btn{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-toilet{border-color:var(--accent2);color:var(--accent2);}
.btn-toilet:hover{background:var(--accent2);color:#0d1117;}
.main{display:flex;flex:1;overflow:hidden;}
.map-wrap{flex:1;position:relative;overflow:hidden;background:#080c12;}
#mapSvg{width:100%;height:100%;display:block;}
.hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted);background:rgba(13,17,23,.85);padding:4px 12px;border-radius:12px;pointer-events:none;white-space:nowrap;}
.side{width:255px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sec{padding:13px;border-bottom:1px solid var(--border);}
.sec h3{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.pt-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.pt-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pt-val{font-size:11px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pt-lbl{font-size:11px;color:var(--muted);flex-shrink:0;}
#routeResult{margin-top:10px;}
.dist{font-size:13px;color:var(--accent2);font-weight:700;}
.steps{margin-top:8px;max-height:240px;overflow-y:auto;}
.step{display:flex;align-items:flex-start;gap:5px;margin-bottom:5px;font-size:11px;line-height:1.4;}
.snum{background:var(--border);border-radius:3px;padding:1px 5px;font-size:10px;color:var(--muted);flex-shrink:0;margin-top:1px;}
.sfloor{color:var(--accent);font-weight:700;}
.room-list{flex:1;overflow-y:auto;padding:8px;}
.room-item{padding:5px 8px;border-radius:4px;font-size:11px;cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:6px;}
.room-item:hover{background:var(--border);}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.legend{display:flex;flex-direction:column;gap:5px;}
.leg{display:flex;align-items:center;gap:7px;font-size:11px;}
.ldot{width:8px;height:8px;border-radius:50%;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>

<header>
  <div class="logo">🏢 B7 软件学院 · 室内导航</div>

    <a class="btn" href="panorama_full.html" style="text-decoration:none;display:inline-flex;align-items:center;">🌐 全景</a>
    <button class="btn btn-toilet" onclick="nearestToilet()">🚻 最近厕所</button>
    <button class="btn" onclick="clearAll()">✕ 清除</button>
  </div>
</header>

  <div class="map-wrap">

      <g id="gNode"></g><g id="gLabel"></g>
    </svg>
    <div class="hint" id="hint">点击节点设置起点</div>
  </div>
  <div class="side">
    <div class="sec">
      <h3>路径规划</h3>
      <div class="pt-row"><div class="pt-dot" style="background:var(--green)"></div><div class="pt-lbl">起点</div><div class="pt-val" id="lblStart">点击地图选择</div></div>
      <div class="pt-row"><div class="pt-dot" style="background:var(--red)"></div><div class="pt-lbl">终点</div><div class="pt-val" id="lblEnd">点击地图选择</div></div>
      <div id="routeResult"></div>
    </div>
    <div class="sec">
      <h3>图例</h3>
      <div class="legend">
        <div class="leg"><div class="ldot" style="background:var(--accent)"></div>走廊节点</div>
        <div class="leg"><div class="ldot" style="background:var(--accent2)"></div>设施（洗手间等）</div>
        <div class="leg"><div class="ldot" style="background:var(--green)"></div>房间</div>

        <div class="leg"><div class="ldot" style="background:var(--yellow)"></div>出入口 / 连廊</div>
      </div>
    </div>
    <div class="sec" style="padding-bottom:6px;"><h3>本层房间（点击导航）</h3></div>
    <div class="room-list" id="roomList"></div>
  </div>
</div>

const graphCache={};

async function loadJsonGraphs(){
  for(const[f,url] of Object.entries(JSON_GRAPHS)){
    try{
      const r=await fetch(url);
      if(!r.ok) continue;
      const g=await r.json();
      if(g.nodes.every(n=>n.x_px!=null&&n.y_px!=null)) graphCache[f]=g;
    }catch(e){ console.warn('JSON graph load failed',url,e); }
  }
}

function jsonToFloorView(g,f){
  return{
    title:g.description||`${f}F`,
    nodes:g.nodes.map(n=>({id:n.id,label:n.label,role:n.role,x:n.x_px,y:n.y_px})),
    edges:g.edges.map(e=>[e.from,e.to,e.weight]),
    toilets:(g.facilities||[]).filter(x=>x.type==='洗手间').map(x=>x.nodeId),
    planImage:g.meta?.planImage||PLAN_IMAGES[f]?.src,
    planW:g.meta?.planWidth||760,
    planH:g.meta?.planHeight||520,
    source:'json',
  };
}

function getFloorView(f){
  if(graphCache[f]) return jsonToFloorView(graphCache[f],f);
  const fd=FLOORS[f];
  const plan=PLAN_IMAGES[f];
  return{
    ...fd,
    planImage:plan?.src,
    planW:plan?.w||760,
    planH:plan?.h||520,
    source:'floors',
  };
}

function remapCrossNode(id){
  if(!graphCache[1]) return id;
  if(id==='f1_jse') return 'fork_se';
  if(id==='f1_link_a') return 'link_to_a';
  return id;
}
function crossEdges(){
  const out=[];
  if(graphCache[1]){
    out.push(['sn_elec','f2_stN',15],['ws_stair','f2_stS',15]);
    for(let f=2;f<=4;f++){
      out.push([`f${f}_stN`,`f${f+1}_stN`,15],[`f${f}_stS`,`f${f+1}_stS`,15]);
    }
  }else out.push(...CROSS_STAIRS);
  for(const[a,b,w] of CROSS_CAMPUS) out.push([remapCrossNode(a),remapCrossNode(b),w]);
  return out;
}

// ── 寻路（复用 js/pathfind.browser.js，与 indoor_nav / node_nav 同算法）──
function buildGraph(){
  const nodes=[],edges=[],seen=new Set();
  for(const f of FLOOR_ORDER){
    const fd=getFloorView(f);
    if(!fd) continue;
    for(const n of fd.nodes){
      if(!seen.has(n.id)){nodes.push({id:n.id});seen.add(n.id);}
    }
    for(const[a,b,w] of fd.edges) edges.push({from:a,to:b,weight:w});
  }
  const ids=new Set(nodes.map(n=>n.id));
  for(const[a,b,w] of crossEdges()){
    if(ids.has(a)&&ids.has(b)) edges.push({from:a,to:b,weight:w});
  }
  return {nodes,edges};
}
function runDijkstra(s,e){
  const r=IndoorPathfind.dijkstra(buildGraph(),s,e);
  if(!r.pathNodeIds.length) return null;
  return { distance: r.distance, path: r.pathNodeIds };
}

    // 左翼走廊（缩窄后偏左，x=80）
    g.appendChild(svg('rect',{x:78,y:25,width:20,height:470,fill:'#243550',rx:1}));
    g.appendChild(svg('rect',{x:78,y:25,width:20,height:470,fill:'none',stroke:'#3a5575','stroke-width':'0.8',rx:1}));
    const ot=svg('text',{x:183,y:268,'text-anchor':'middle',fill:'#1a2d45','font-size':'9',
      'font-family':'Segoe UI,sans-serif','writing-mode':'vertical-rl'});
    ot.textContent='办公室带'; g.appendChild(ot);
  }

  // ④ 标注
  const ct=svg('text',{x:420,y:268,'text-anchor':'middle',fill:'#1a2d45','font-size':'12',
    'font-family':'Segoe UI,sans-serif','letter-spacing':'2'});
  ct.textContent='庭 院 上 空'; g.appendChild(ct);
  const ft=svg('text',{x:22,y:514,fill:'#2a4060','font-size':'11',
    'font-family':'Segoe UI,sans-serif','font-weight':'bold'});
  ft.textContent=fd.title; g.appendChild(ft);
  const arr=svg('text',{x:750,y:493,'font-size':'11',fill:'#f7f74f',
    'text-anchor':'middle','font-family':'Segoe UI,sans-serif'});
  arr.textContent='→A区'; g.appendChild(arr);
}

function renderEdges(){
  const g=document.getElementById('gEdge');g.innerHTML='';
  const fd=getFloorView(floor);
  const nm={};for(const n of fd.nodes) nm[n.id]=n;
  for(const[a,b] of fd.edges){
    const na=nm[a],nb=nm[b];if(!na||!nb)continue;
    g.appendChild(svg('line',{x1:na.x,y1:na.y,x2:nb.x,y2:nb.y,stroke:'#253550','stroke-width':'1.5',opacity:'0.7'}));
  }
}

function renderPath(){
  const g=document.getElementById('gPath');g.innerHTML='';
  if(!curPath)return;
  for(let i=0;i<curPath.path.length-1;i++){
    const a=allNodes[curPath.path[i]],b=allNodes[curPath.path[i+1]];
    if(!a||!b||a.floor!==floor||b.floor!==floor)continue;
    const ln=svg('line',{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:'#f0883e','stroke-width':'3.5','stroke-dasharray':'9,4',opacity:'0.95'});
    const an=document.createElementNS(NS,'animate');
    an.setAttribute('attributeName','stroke-dashoffset');
    an.setAttribute('values','0;-13');an.setAttribute('dur','0.7s');an.setAttribute('repeatCount','indefinite');
    ln.appendChild(an);g.appendChild(ln);
  }
}

function renderNodes(){
  const gN=document.getElementById('gNode'),gL=document.getElementById('gLabel');
  gN.innerHTML='';gL.innerHTML='';
  const onPath=new Set(curPath?curPath.path:[]);
  for(const n of getFloorView(floor).nodes){
    const isS=n.id===startN,isE=n.id===endN,inP=onPath.has(n.id);
    const col=RC[n.role]||'#888';
    const r=isS||isE?9:6;
    const grp=svg('g',{'data-id':n.id});
    grp.style.cursor='pointer';
    if(inP&&!isS&&!isE) grp.appendChild(svg('circle',{cx:n.x,cy:n.y,r:r+5,fill:col,opacity:'0.15'}));
    if(isS||isE) grp.appendChild(svg('circle',{cx:n.x,cy:n.y,r:r+3,fill:'none',stroke:isS?'#3fb950':'#f85149','stroke-width':'2',opacity:'0.9'}));
    grp.appendChild(svg('circle',{cx:n.x,cy:n.y,r,
      fill:inP?col:(n.role==='corridor'?'#162030':col),
      stroke:col,'stroke-width':'1.5',opacity:inP?'1':'0.8'}));
    grp.addEventListener('click',()=>onNodeClick(n.id));
    gN.appendChild(grp);
    if(n.role!=='corridor'){
      const t=svg('text',{x:n.x+r+3,y:n.y+4,'font-size':'9',fill:inP?'#e8aa70':'#5a7a9a',
        'font-family':'Segoe UI,sans-serif','pointer-events':'none'});
      t.textContent=n.label;gL.appendChild(t);
    }
  }
}

function render(){updateMapViewBox();renderBuild();renderEdges();renderPath();renderNodes();updateSide();}

// ── 交互 ─────────────────────────────────────────────────────────
function onNodeClick(id){
  if(mode==='start'){startN=id;mode='end';document.getElementById('hint').textContent='已选起点，再点一个节点设为终点';}
  else{endN=id;mode='start';document.getElementById('hint').textContent='点击节点重新设置起点';calcPath();}
  render();
}

function calcPath(){
  if(!startN||!endN)return;
  curPath=runDijkstra(startN,endN);
  render();showResult();
}

function showResult(){
  const div=document.getElementById('routeResult');
  if(!curPath){div.innerHTML='<div style="color:var(--red);font-size:12px;margin-top:8px;">❌ 未找到路径</div>';return;}
  let steps=[],prevF=null;
  for(let i=0;i<curPath.path.length;i++){
    const n=allNodes[curPath.path[i]];if(!n)continue;
    if(n.floor!==prevF){
      if(prevF!==null){
        const dest=FLOOR_TAB_LABELS[n.floor]||`${n.floor}F`;
        const how=n.floor>=6?'通过连廊/楼梯':'乘楼梯';
        steps.push({type:'floor',text:`前往 ${dest}（${how}）`});
      }
      prevF=n.floor;
    }
    if(n.role!=='corridor'||i===0||i===curPath.path.length-1)
      steps.push({type:'node',text:n.label,role:n.role});
  }
  const html=steps.map((s,i)=>s.type==='floor'
    ?`<div class="step"><span class="sfloor">🔼 ${s.text}</span></div>`
    :`<div class="step"><span class="snum">${i+1}</span><span>${s.text}</span></div>`
  ).join('');
  div.innerHTML=`<div class="dist" style="margin-top:8px;">约 ${Math.round(curPath.distance)} 米</div><div class="steps">${html}</div>`;
}

function updateSide(){
  document.getElementById('lblStart').textContent=startN?(allNodes[startN]?.label||startN):'点击地图选择';
  document.getElementById('lblEnd').textContent=endN?(allNodes[endN]?.label||endN):'点击地图选择';
  const fd=getFloorView(floor);
  const rooms=fd.nodes.filter(n=>n.role==='room'||n.role==='facility'||n.role==='door');
  document.getElementById('roomList').innerHTML=rooms.map(n=>
    `<div class="room-item" onclick="onNodeClick('${n.id}')"><div class="rdot" style="background:${RC[n.role]||'#888'}"></div>${n.label}</div>`
  ).join('');
  const src=fd.source==='json'?' · JSON路网':' · 示意数据';
  document.querySelector('.logo').textContent=`🏢 B7 软件学院 · 室内导航${src}`;
}

function nearestToilet(){
  if(!startN){alert('请先点击地图选择当前位置（起点）');return;}
  let best=null,bestId=null;
  for(const f of FLOOR_ORDER){
    const fd=getFloorView(f);
    if(!fd) continue;
    for(const tid of fd.toilets||[]){
      const r=runDijkstra(startN,tid);
      if(r&&(!best||r.distance<best.distance)){best=r;bestId=tid;}
    }
  }
  if(!best){alert('未找到洗手间路径');return;}
  endN=bestId;curPath=best;
  const fn=allNodes[bestId]?.floor;if(fn)switchFloor(fn);
  render();showResult();
}

function clearAll(){
  startN=null;endN=null;curPath=null;mode='start';
  document.getElementById('hint').textContent='点击节点设置起点';
  document.getElementById('routeResult').innerHTML='';render();
}

function switchFloor(f){
  floor=f;
  startN=null;endN=null;curPath=null;mode='start';
  document.querySelectorAll('.floor-tab').forEach(t=>t.classList.toggle('active',+t.dataset.f===f));
  render();
}

async function init(){
  await loadJsonGraphs();
  buildNodeMap();
  const tabs=document.getElementById('floorTabs');
  for(const f of FLOOR_ORDER){
    const b=document.createElement('button');
    b.className='floor-tab'+(f===1?' active':'');
    b.dataset.f=f;
    b.textContent=FLOOR_TAB_LABELS[f];
    b.onclick=()=>switchFloor(f);
    tabs.appendChild(b);
  }
  render();
}
window.onload=init;
</script>
